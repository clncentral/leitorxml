<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfraDesk Doca • Gráficos e IDs v10.1</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --soft: #f8fafc;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --green: #16a34a;
      --red: #dc2626;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.075);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 32%),
        radial-gradient(circle at top right, rgba(22, 163, 74, 0.09), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    button, input, select { font-family: inherit; }

    .app {
      width: min(1880px, calc(100% - 18px));
      margin: 0 auto;
      padding: 10px 0 24px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 9px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px;
      margin-bottom: 10px;
      backdrop-filter: blur(12px);
    }

    .segmented {
      flex: 0 0 auto;
      display: inline-flex;
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 4px;
      gap: 4px;
      min-width: 0;
    }

    .segmented button,
    .navBtn,
    .actionBtn,
    .idsBtn {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: #334155;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 950;
      cursor: pointer;
      transition: 0.15s ease;
      white-space: nowrap;
    }

    .segmented button.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    .segmented button:not(.active):hover,
    .navBtn:hover:not(:disabled),
    .actionBtn:hover,
    .idsBtn:hover {
      background: #fff;
      border-color: var(--border);
      transform: translateY(-1px);
    }

    .periodNav {
      flex: 0 0 280px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 38px;
      gap: 6px;
      align-items: center;
      min-width: 240px;
    }

    .navBtn {
      background: #fff;
      border-color: var(--border);
      padding: 8px;
      font-size: 18px;
      line-height: 1;
    }

    .navBtn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      transform: none;
    }

    .periodLabel {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 950;
      color: #1f2937;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .customRange {
      flex: 0 1 270px;
      min-width: 250px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 7px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 4px;
      min-width: 0;
      flex: 1 1 180px;
    }

    .field.small { flex: 0 1 150px; }
    .field.medium { flex: 1 1 220px; }

    .field label,
    .customRange label {
      color: #374151;
      font-size: 11px;
      font-weight: 950;
      line-height: 1;
      display: grid;
      gap: 4px;
    }

    .field input,
    .field select,
    .customRange input,
    .detailsSearch {
      width: 100%;
      min-width: 0;
      min-height: 38px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 8px 9px;
      font-size: 12px;
      outline: none;
    }

    .field input:focus,
    .field select:focus,
    .customRange input:focus,
    .detailsSearch:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .actionBtn,
    .idsBtn {
      background: #fff;
      border-color: var(--border);
      align-self: end;
    }

    .chipsGrid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .chipsPanel {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px;
      min-width: 0;
    }

    .chipsHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .chipsHead h3 {
      margin: 0;
      font-size: 13px;
      letter-spacing: -0.02em;
    }

    .selectMeta {
      color: var(--muted);
      font-size: 11px;
      font-weight: 950;
      white-space: nowrap;
    }

    .chipsBox {
      min-height: 42px;
      max-height: 78px;
      overflow: auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 6px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-content: flex-start;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f9fafb;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      font-weight: 900;
      color: #374151;
      max-width: 100%;
    }

    .chip input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: var(--blue);
      flex: 0 0 auto;
    }

    .chip span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 210px;
    }

    .chip.active {
      border-color: #bfdbfe;
      background: var(--blue-soft);
      color: #1d4ed8;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 290px;
      gap: 10px;
      align-items: start;
    }

    .main.noSummary { grid-template-columns: minmax(0, 1fr); }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      min-width: 0;
    }

    .panelHead {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .panelTitle {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      font-weight: 700;
    }

    .statusHint {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      background: #94a3b8;
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.16);
    }

    .dot.ok {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.16);
    }

    .dot.err {
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.16);
    }

    .legend {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }

    .legendItem {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: 12px;
      font-weight: 900;
      color: #374151;
    }

    .legendDot,
    .colorDot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .chartWrap {
      width: 100%;
      overflow-x: auto;
      padding: 4px 2px 7px;
      border-radius: 18px;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(135deg, rgba(37, 99, 235, 0.18), rgba(22, 163, 74, 0.14)) border-box;
      border: 1px solid transparent;
    }

    .chart {
      min-width: 720px;
      height: clamp(430px, calc(100vh - 250px), 760px);
      position: relative;
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      display: block;
    }

    .summaryBig {
      background: linear-gradient(135deg, #eff6ff, #f0fdf4);
      border: 1px solid #dbeafe;
      border-radius: 17px;
      padding: 12px;
      margin-bottom: 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .summaryBig span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
    }

    .summaryBig strong {
      color: var(--text);
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.06em;
    }

    .rankList {
      display: grid;
      gap: 8px;
    }

    .rankItem {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px;
      align-items: center;
      border: 1px solid var(--border);
      background: var(--soft);
      border-radius: 15px;
      padding: 8px;
    }

    .rankName {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      font-weight: 950;
      font-size: 12px;
    }

    .rankName span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rankValue {
      font-weight: 950;
      color: var(--blue);
    }

    .progressTrack {
      grid-column: 1 / -1;
      height: 6px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .progressFill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
    }

    .detailsPanel { margin-top: 10px; }

    .detailsTop {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 9px;
    }

    .detailsSearch { width: min(420px, 100%); font-size: 13px; }

    .tableBox {
      max-height: 520px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      min-width: 1260px;
    }

    th, td {
      padding: 10px 11px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 12px;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      color: #4b5563;
      font-weight: 950;
      position: sticky;
      top: 0;
      z-index: 2;
      white-space: nowrap;
    }

    tbody tr:hover td { background: #f9fbff; }

    .idLink {
      color: var(--blue);
      font-weight: 950;
      text-decoration: none;
      white-space: nowrap;
    }

    .idLink:hover { text-decoration: underline; }

    .muted {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .supplier {
      font-weight: 900;
      color: #1f2937;
      max-width: 300px;
    }

    .subcat,
    .statusPill,
    .userPill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      font-weight: 950;
      white-space: nowrap;
    }

    .subcat { background: #f1f5f9; color: #334155; }
    .statusPill { background: #ecfdf5; color: #166534; }
    .userPill { color: #fff; }

    .keyWrap { display: grid; gap: 6px; min-width: 360px; }

    .keyText {
      font-family: Consolas, Monaco, 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-all;
      user-select: text;
    }

    .keyCnpj {
      background: #fef3c7;
      color: #92400e;
      border-radius: 5px;
      padding: 1px 2px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .keyNum {
      background: #dcfce7;
      color: #166534;
      border-radius: 5px;
      padding: 1px 2px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .copyBtn {
      min-height: 25px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      color: #334155;
      padding: 4px 7px;
      font-size: 11px;
      font-weight: 950;
      cursor: pointer;
    }

    .copyBtn:hover { background: #f8fafc; border-color: #bfdbfe; }

    .dateCell {
      white-space: nowrap;
      color: #334155;
      font-size: 12px;
      font-weight: 850;
      line-height: 1.35;
    }

    .tooltip {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -115%);
      background: #111827;
      color: #fff;
      padding: 9px 10px;
      border-radius: 12px;
      font-size: 12px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.25);
      z-index: 40;
      transition: opacity 0.12s ease;
      white-space: nowrap;
    }

    .toast {
      position: fixed;
      right: 14px;
      bottom: 14px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: .18s ease;
      box-shadow: 0 14px 32px rgba(15, 23, 42, .25);
      z-index: 50;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    .empty {
      text-align: center;
      padding: 34px 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .hidden { display: none !important; }

    .pulse { animation: pulseValue 0.55s ease; }

    @keyframes pulseValue {
      0% { transform: scale(1); }
      45% { transform: scale(1.16); color: #16a34a; }
      100% { transform: scale(1); }
    }

    @media (max-width: 1320px) {
      .main { grid-template-columns: 1fr; }
      .chipsGrid { grid-template-columns: 1fr; }
    }

    @media (max-width: 900px) {
      .segmented { width: 100%; overflow-x: auto; }
      .segmented button { flex: 1; }
      .periodNav, .customRange, .field { flex: 1 1 100%; min-width: 0; }
      .chart { min-width: 650px; height: 450px; }
      .detailsTop { align-items: stretch; flex-direction: column; }
    }

    @media (max-width: 760px) {
      .app { width: min(100% - 12px, 1880px); padding-top: 7px; }
      .panelHead { flex-direction: column; }
      .actionBtn, .idsBtn { width: 100%; }
      .chipsBox { max-height: 120px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="toolbar">
      <div class="segmented" aria-label="Período">
        <button id="modeWeek" type="button" data-mode="week" class="active">Semana</button>
        <button id="modeMonth" type="button" data-mode="month">Mês</button>
        <button id="modeCustom" type="button" data-mode="custom">Personalizado</button>
        <button id="modeAll" type="button" data-mode="all">Tudo</button>
      </div>

      <div class="periodNav">
        <button id="prevPeriodBtn" class="navBtn" type="button" aria-label="Período anterior">‹</button>
        <div id="periodLabel" class="periodLabel">—</div>
        <button id="nextPeriodBtn" class="navBtn" type="button" aria-label="Próximo período">›</button>
      </div>

      <div id="customRange" class="customRange hidden">
        <label>Inicial <input id="dateFrom" type="date" /></label>
        <label>Final <input id="dateTo" type="date" /></label>
      </div>

      <div class="field medium">
        <label>Busca geral</label>
        <input id="searchGeneral" type="text" placeholder="Fornecedor, loja, chave, usuário..." />
      </div>

      <div class="field small">
        <label>Chamado</label>
        <input id="searchChamado" type="text" placeholder="Ex.: 536621" />
      </div>

      <div class="field small">
        <label>Nº NF</label>
        <input id="searchNf" type="text" placeholder="Com ou sem zeros" />
      </div>

      <div class="field small">
        <label>CNPJ</label>
        <input id="searchCnpj" type="text" placeholder="Com ou sem máscara" />
      </div>

      <div class="field small">
        <label>Subcategoria</label>
        <select id="filterSubcategoria"><option value="">Todas</option></select>
      </div>

      <div class="field small">
        <label>Agrupar por</label>
        <select id="groupBy">
          <option value="usuario" selected>Usuário</option>
          <option value="lojaTexto">Loja</option>
          <option value="subcategoria">Subcategoria</option>
          <option value="statusNome">Status</option>
          <option value="fornecedorNome">Fornecedor</option>
        </select>
      </div>

      <div class="field small">
        <label>Gráfico</label>
        <select id="chartMode">
          <option value="auto" selected>Automático</option>
          <option value="bar">Barras por dia</option>
          <option value="line">Linha por dia</option>
          <option value="total">Resumo total</option>
        </select>
      </div>

      <button id="clearBtn" class="actionBtn" type="button">Limpar</button>
      <button id="reloadBtn" class="actionBtn" type="button">Atualizar</button>
      <button id="summaryToggleBtn" class="actionBtn" type="button">Ocultar resumo</button>
    </div>

    <div class="chipsGrid">
      <div class="chipsPanel">
        <div class="chipsHead">
          <h3>Usuários</h3>
          <span id="usersMeta" class="selectMeta">Todos</span>
        </div>
        <div id="usersBox" class="chipsBox"></div>
      </div>

      <div class="chipsPanel">
        <div class="chipsHead">
          <h3>Lojas</h3>
          <span id="storesMeta" class="selectMeta">Todas</span>
        </div>
        <div id="storesBox" class="chipsBox"></div>
      </div>
    </div>

    <div id="mainGrid" class="main">
      <div class="panel">
        <div class="panelHead">
          <div>
            <h2 id="chartTitle" class="panelTitle">Doca</h2>
            <div id="chartHint" class="hint">Capturas por usuário.</div>
          </div>

          <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:flex-end;">
            <span class="statusHint"><span id="statusDot" class="dot"></span><span id="statusText">Conectando...</span></span>
            <button id="toggleDetailsBtn" class="idsBtn" type="button">Ver IDs</button>
            <button id="exportBtn" class="idsBtn" type="button">Exportar CSV</button>
          </div>
        </div>

        <div id="legend" class="legend"></div>

        <div class="chartWrap">
          <div id="chart" class="chart"></div>
        </div>
      </div>

      <div id="summaryPanel" class="panel summaryPanel">
        <div class="panelHead">
          <div>
            <h2 class="panelTitle">Resumo</h2>
            <div id="summaryMeta" class="hint">0 grupo(s)</div>
          </div>
        </div>

        <div class="summaryBig">
          <span>Total filtrado</span>
          <strong id="summaryTotal">0</strong>
        </div>

        <div id="ranking" class="rankList"></div>
      </div>
    </div>

    <div id="detailsPanel" class="panel detailsPanel hidden">
      <div class="detailsTop">
        <div>
          <h2 class="panelTitle">IDs dos chamados</h2>
          <div id="detailsHint" class="hint">0 chamado(s).</div>
        </div>

        <input id="searchInput" class="detailsSearch" type="text" placeholder="Buscar na tabela: ID, usuário, loja, fornecedor, NF..." />
      </div>

      <div class="tableBox">
        <table>
          <thead>
            <tr>
              <th style="width:95px;">ID</th>
              <th style="width:110px;">Reservado</th>
              <th style="width:110px;">Aberto</th>
              <th style="width:180px;">Loja</th>
              <th>Fornecedor</th>
              <th style="width:130px;">Subcategoria</th>
              <th style="width:130px;">Status</th>
              <th>Chave de acesso</th>
              <th style="width:150px;">Usuário</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tooltip" class="tooltip"></div>
  <div id="toast" class="toast">Copiado</div>

  <script>
    const PainelDoca = {};

    PainelDoca.FIREBASE_DB_URL = 'https://infra-doca-default-rtdb.firebaseio.com';
    PainelDoca.PATH = '/doca_capturas/by_id.json';

    PainelDoca.GROUP_LABELS = {
      usuario: 'usuário',
      lojaTexto: 'loja',
      subcategoria: 'subcategoria',
      statusNome: 'status',
      fornecedorNome: 'fornecedor'
    };

    PainelDoca.state = {
      byId: {},
      eventSource: null,
      renderFrame: null,
      selectedUsers: new Set(),
      selectedStores: new Set(),
      touchedUsers: false,
      touchedStores: false,
      mode: 'week',
      weekStart: null,
      monthStart: null,
      lastTotalCount: 0,
      lastTotals: new Map(),
      detailsVisible: false,
      summaryVisible: true,
      queryMode: 'turbo',
      hasInitialLoad: false,
      reloadTimer: null
    };

    PainelDoca.clean = function (value) {
      return String(value ?? '').replace(/\s+/g, ' ').trim();
    };

    PainelDoca.shortUserName = function (value) {
      value = PainelDoca.clean(value);
      if (!value) return '';
      const parts = value.split(' ').filter(Boolean);
      return parts.length <= 2 ? value : parts[0] + ' ' + parts[1];
    };

    PainelDoca.onlyDigits = function (value) {
      return String(value ?? '').replace(/\D+/g, '');
    };

    PainelDoca.norm = function (value) {
      return PainelDoca.clean(value)
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    };

    PainelDoca.escapeHTML = function (value) {
      return PainelDoca.clean(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    };

    PainelDoca.pad = function (n) {
      return String(n).padStart(2, '0');
    };

    PainelDoca.formatCnpj = function (cnpj) {
      cnpj = PainelDoca.onlyDigits(cnpj);
      if (cnpj.length !== 14) return cnpj;
      return cnpj.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5');
    };

    PainelDoca.toDateInput = function (date) {
      return `${date.getFullYear()}-${PainelDoca.pad(date.getMonth() + 1)}-${PainelDoca.pad(date.getDate())}`;
    };

    PainelDoca.dateFromKey = function (key) {
      const d = new Date(String(key || '') + 'T00:00:00');
      return String(d) === 'Invalid Date' ? null : d;
    };

    PainelDoca.cloneDate = function (date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    };

    PainelDoca.addDays = function (date, days) {
      const d = PainelDoca.cloneDate(date);
      d.setDate(d.getDate() + days);
      return d;
    };

    PainelDoca.addMonths = function (date, months) {
      return new Date(date.getFullYear(), date.getMonth() + months, 1);
    };

    PainelDoca.startOfWeek = function (date) {
      const d = PainelDoca.cloneDate(date);
      d.setDate(d.getDate() - d.getDay());
      return d;
    };

    PainelDoca.startOfMonth = function (date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    };

    PainelDoca.endOfMonth = function (date) {
      return new Date(date.getFullYear(), date.getMonth() + 1, 0);
    };

    PainelDoca.shortDateLabel = function (key) {
      const p = String(key || '').split('-');
      return p.length === 3 ? `${p[2]}/${p[1]}` : key || '—';
    };

    PainelDoca.fullDateLabel = function (key) {
      const p = String(key || '').split('-');
      return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : key || '—';
    };

    PainelDoca.weekdayLabel = function (key) {
      const d = PainelDoca.dateFromKey(key);
      const names = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      return d ? names[d.getDay()] : '';
    };

    PainelDoca.monthName = function (date) {
      return date.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    };

    PainelDoca.todayKey = function () {
      return PainelDoca.toDateInput(new Date());
    };

    PainelDoca.inputDateToMs = function (value, endOfDay) {
      value = PainelDoca.clean(value);
      if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return 0;
      const parts = value.split('-').map(Number);
      const d = endOfDay
        ? new Date(parts[0], parts[1] - 1, parts[2], 23, 59, 59, 999)
        : new Date(parts[0], parts[1] - 1, parts[2], 0, 0, 0, 0);
      const n = d.getTime();
      return Number.isFinite(n) ? n : 0;
    };

    PainelDoca.toMillis = function (item) {
      const values = [item.capturadoEm, item.atualizadoEm, item.ts];
      for (const value of values) {
        const n = Number(value || 0);
        if (Number.isFinite(n) && n > 0) return n;
      }
      if (item.aberturaISO) {
        const n = new Date(item.aberturaISO).getTime();
        if (Number.isFinite(n)) return n;
      }
      return 0;
    };

    PainelDoca.dateKeyFromTs = function (ts) {
      const n = Number(ts || 0);
      if (!Number.isFinite(n) || n <= 0) return '';
      const d = new Date(n);
      if (String(d) === 'Invalid Date') return '';
      return PainelDoca.toDateInput(d);
    };

    PainelDoca.formatDateTimeFromTs = function (ts) {
      const n = Number(ts || 0);
      if (!Number.isFinite(n) || n <= 0) return '';
      const d = new Date(n);
      if (String(d) === 'Invalid Date') return '';
      return `${PainelDoca.pad(d.getDate())}/${PainelDoca.pad(d.getMonth() + 1)}/${d.getFullYear()} ${PainelDoca.pad(d.getHours())}:${PainelDoca.pad(d.getMinutes())}`;
    };

    PainelDoca.firebaseBaseUrl = function () {
      return PainelDoca.FIREBASE_DB_URL.replace(/\/+$/, '') + PainelDoca.PATH;
    };

    PainelDoca.currentRange = function () {
      if (PainelDoca.state.mode === 'week') {
        const start = PainelDoca.cloneDate(PainelDoca.state.weekStart);
        const end = PainelDoca.addDays(start, 6);
        return { start, end, startKey: PainelDoca.toDateInput(start), endKey: PainelDoca.toDateInput(end) };
      }

      if (PainelDoca.state.mode === 'month') {
        const start = PainelDoca.cloneDate(PainelDoca.state.monthStart);
        const end = PainelDoca.endOfMonth(start);
        return { start, end, startKey: PainelDoca.toDateInput(start), endKey: PainelDoca.toDateInput(end) };
      }

      if (PainelDoca.state.mode === 'custom') {
        const fromInput = document.getElementById('dateFrom');
        const toInput = document.getElementById('dateTo');
        if (fromInput.value && toInput.value && fromInput.value > toInput.value) {
          const old = fromInput.value;
          fromInput.value = toInput.value;
          toInput.value = old;
        }
        return {
          start: fromInput.value ? PainelDoca.dateFromKey(fromInput.value) : null,
          end: toInput.value ? PainelDoca.dateFromKey(toInput.value) : null,
          startKey: fromInput.value || '',
          endKey: toInput.value || ''
        };
      }

      return { start: null, end: null, startKey: '', endKey: '' };
    };

    PainelDoca.firebaseQueryString = function (useServerDateFilter) {
      if (useServerDateFilter === false || PainelDoca.state.mode === 'all') return '';
      const range = PainelDoca.currentRange();
      const params = new URLSearchParams();
      params.set('orderBy', JSON.stringify('capturadoEm'));
      const startMs = range.startKey ? PainelDoca.inputDateToMs(range.startKey, false) : 0;
      const endMs = range.endKey ? PainelDoca.inputDateToMs(range.endKey, true) : 0;
      if (startMs) params.set('startAt', String(startMs));
      if (endMs) params.set('endAt', String(endMs));
      const query = params.toString();
      return query ? '?' + query : '';
    };

    PainelDoca.firebaseUrl = function (useServerDateFilter) {
      return PainelDoca.firebaseBaseUrl() + PainelDoca.firebaseQueryString(useServerDateFilter !== false);
    };

    PainelDoca.hashHue = function (str) {
      let h = 0;
      str = PainelDoca.norm(str || 'grupo');
      for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
      return Math.abs(h) % 360;
    };

    PainelDoca.CORES_FIXAS_POR_USUARIO = {
      'Elias Araujo': '#0324ff',
      'Camily Assis': '#e6cff2',
      'Elia Maria': '#962bcc',
      'Elia Oliveira': '#962bcc',
      'Maria Assis': '#ff8e03',
      'Marcia': '#6a0e9c',
      'Helena': '#8c1223'
    };

    PainelDoca.fixedColorFor = function (name) {
      const key = PainelDoca.norm(name);
      for (const [fixedName, color] of Object.entries(PainelDoca.CORES_FIXAS_POR_USUARIO)) {
        const fixedKey = PainelDoca.norm(fixedName);
        if (key === fixedKey || key.includes(fixedKey) || fixedKey.includes(key)) return color;
      }
      return '';
    };

    PainelDoca.colorFor = function (name) {
      return PainelDoca.fixedColorFor(name) || `hsl(${PainelDoca.hashHue(name)} 72% 46%)`;
    };

    PainelDoca.textColorFor = function (name) {
      const color = PainelDoca.colorFor(name);
      const match = String(color || '').match(/^#([0-9a-f]{6})$/i);
      if (!match) return '#ffffff';
      const hex = match[1];
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.62 ? '#111827' : '#ffffff';
    };

    PainelDoca.normalizeItem = function (key, item) {
      const raw = item && typeof item === 'object' ? item : {};
      const id = PainelDoca.clean(raw.chamadoId || raw.id || key);
      const usuario = PainelDoca.clean(raw.usuario || raw.operador || raw.nome || 'Sem usuário');
      const lojaTexto = PainelDoca.clean(raw.lojaTexto || raw.lojaNome || raw.solicitanteLojaTexto || 'Sem loja');
      const lojaCodigo = PainelDoca.clean(raw.lojaCodigo || '');
      const lojaNome = PainelDoca.clean(raw.lojaNome || '');
      const fornecedorNome = PainelDoca.clean(raw.fornecedorNome || raw.fornecedorTexto || 'Sem fornecedor');
      const subcategoria = PainelDoca.clean(raw.subcategoria || 'Sem subcategoria');
      const statusNome = PainelDoca.clean(raw.statusNome || raw.statusAntesNome || 'Sem status');
      const chaveAcesso = PainelDoca.onlyDigits(raw.chaveAcesso || (raw.nfe && raw.nfe.chaveAcesso) || '');
      const cnpjEmitente = PainelDoca.onlyDigits(raw.cnpjEmitente || (raw.nfe && raw.nfe.cnpjEmitente) || (chaveAcesso.length === 44 ? chaveAcesso.slice(6, 20) : ''));
      const nfNumero = PainelDoca.onlyDigits(raw.nfNumero || raw.numeroNfChave || (raw.nfe && raw.nfe.numero) || (chaveAcesso.length === 44 ? chaveAcesso.slice(25, 34) : ''));
      const nfNumeroLimpo = String(Number(nfNumero || 0) || '');
      const ts = PainelDoca.toMillis(raw);

      if (!id) return null;

      return {
        ...raw,
        id,
        usuario,
        lojaTexto,
        lojaCodigo,
        lojaNome,
        fornecedorNome,
        subcategoria,
        statusNome,
        chaveAcesso,
        cnpjEmitente,
        cnpjEmitenteFormatado: raw.cnpjEmitenteFormatado || (raw.nfe && raw.nfe.cnpjEmitenteFormatado) || PainelDoca.formatCnpj(cnpjEmitente),
        nfNumero,
        nfNumeroLimpo,
        ts,
        reservaDataKey: PainelDoca.dateKeyFromTs(ts),
        reservaDataTexto: PainelDoca.formatDateTimeFromTs(ts)
      };
    };

    PainelDoca.normalizeSnapshot = function (data) {
      const out = {};
      for (const [key, item] of Object.entries(data || {})) {
        const normalized = PainelDoca.normalizeItem(key, item);
        if (normalized) out[normalized.id] = normalized;
      }
      return out;
    };

    PainelDoca.getItems = function () {
      return Object.values(PainelDoca.state.byId || {}).map((item) => PainelDoca.normalizeItem(item.id || item.chamadoId, item)).filter(Boolean);
    };

    PainelDoca.unique = function (arr) {
      return [...new Set(arr.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'pt-BR'));
    };

    PainelDoca.getAllUsers = function () {
      return PainelDoca.unique(PainelDoca.getItems().map(item => item.usuario));
    };

    PainelDoca.getAllStores = function () {
      return PainelDoca.unique(PainelDoca.getItems().map(item => item.lojaTexto));
    };

    PainelDoca.getAllSubcategories = function () {
      return PainelDoca.unique(PainelDoca.getItems().map(item => item.subcategoria));
    };

    PainelDoca.getSelectedUsers = function () {
      const all = PainelDoca.getAllUsers();
      if (!PainelDoca.state.touchedUsers) return all;
      return all.filter(user => PainelDoca.state.selectedUsers.has(user));
    };

    PainelDoca.getSelectedStores = function () {
      const all = PainelDoca.getAllStores();
      if (!PainelDoca.state.touchedStores) return all;
      return all.filter(store => PainelDoca.state.selectedStores.has(store));
    };

    PainelDoca.groupNameFor = function (item) {
      const key = document.getElementById('groupBy').value || 'usuario';
      let value = item[key];
      if (key === 'usuario') value = item.usuario;
      if (key === 'lojaTexto') value = item.lojaTexto || item.lojaNome || item.lojaCodigo;
      if (key === 'fornecedorNome') value = item.fornecedorNome;
      if (key === 'subcategoria') value = item.subcategoria;
      if (key === 'statusNome') value = item.statusNome;
      return PainelDoca.clean(value || 'Sem informação');
    };

    PainelDoca.buildFilterContext = function () {
      const nf = PainelDoca.onlyDigits(document.getElementById('searchNf').value);
      return {
        selectedUsers: new Set(PainelDoca.getSelectedUsers()),
        selectedStores: new Set(PainelDoca.getSelectedStores()),
        subcategoria: document.getElementById('filterSubcategoria').value,
        chamado: PainelDoca.onlyDigits(document.getElementById('searchChamado').value),
        nf,
        nfLimpo: String(Number(nf || 0) || ''),
        cnpj: PainelDoca.onlyDigits(document.getElementById('searchCnpj').value),
        general: PainelDoca.norm(document.getElementById('searchGeneral').value),
        range: PainelDoca.currentRange()
      };
    };

    PainelDoca.matchesFilters = function (item, ctx) {
      ctx = ctx || PainelDoca.buildFilterContext();

      if (item.usuario && !ctx.selectedUsers.has(item.usuario)) return false;
      if (item.lojaTexto && !ctx.selectedStores.has(item.lojaTexto)) return false;
      if (ctx.subcategoria && item.subcategoria !== ctx.subcategoria) return false;

      const itemDateKey = item.reservaDataKey || PainelDoca.dateKeyFromTs(item.ts);
      if (PainelDoca.state.mode !== 'all') {
        if (ctx.range.startKey && (!itemDateKey || itemDateKey < ctx.range.startKey)) return false;
        if (ctx.range.endKey && (!itemDateKey || itemDateKey > ctx.range.endKey)) return false;
      }

      if (ctx.chamado && !PainelDoca.onlyDigits(item.id).includes(ctx.chamado)) return false;

      if (ctx.nf) {
        const itemNf = PainelDoca.onlyDigits(item.nfNumero);
        const itemNfLimpo = String(Number(itemNf || 0) || '');
        if (!itemNf.includes(ctx.nf) && itemNfLimpo !== ctx.nfLimpo && !itemNfLimpo.includes(ctx.nfLimpo)) return false;
      }

      if (ctx.cnpj) {
        const itemCnpj = PainelDoca.onlyDigits(item.cnpjEmitente);
        const chave = PainelDoca.onlyDigits(item.chaveAcesso);
        if (!itemCnpj.includes(ctx.cnpj) && !chave.includes(ctx.cnpj)) return false;
      }

      if (ctx.general) {
        const text = PainelDoca.norm([
          item.id,
          item.usuario,
          item.lojaTexto,
          item.lojaNome,
          item.lojaCodigo,
          item.fornecedorNome,
          item.subcategoria,
          item.statusNome,
          item.chaveAcesso,
          item.cnpjEmitente,
          item.nfNumero,
          item.descricaoResumo
        ].join(' '));
        if (!text.includes(ctx.general)) return false;
      }

      return true;
    };

    PainelDoca.getVisibleItems = function () {
      const ctx = PainelDoca.buildFilterContext();
      return PainelDoca.getItems()
        .filter(item => PainelDoca.matchesFilters(item, ctx))
        .sort((a, b) => (b.ts || 0) - (a.ts || 0) || String(b.id).localeCompare(String(a.id), 'pt-BR'));
    };

    PainelDoca.daysInRange = function (start, end) {
      const days = [];
      if (!start || !end || end < start) return days;
      const current = PainelDoca.cloneDate(start);
      while (current <= end) {
        days.push(PainelDoca.toDateInput(current));
        current.setDate(current.getDate() + 1);
      }
      return days;
    };

    PainelDoca.getDayKeysFromItems = function (items) {
      return [...new Set(items.map(item => PainelDoca.dateKeyFromTs(item.ts)).filter(Boolean))].sort();
    };

    PainelDoca.getChartDays = function (items) {
      const mode = PainelDoca.state.mode;
      const range = PainelDoca.currentRange();
      if (mode === 'week' || mode === 'month') return PainelDoca.daysInRange(range.start, range.end);
      const itemDays = PainelDoca.getDayKeysFromItems(items);
      if (mode === 'custom') {
        let startKey = range.startKey;
        let endKey = range.endKey;
        if (!startKey && itemDays.length) startKey = itemDays[0];
        if (!endKey && itemDays.length) endKey = itemDays[itemDays.length - 1];
        if (startKey && endKey) return PainelDoca.daysInRange(PainelDoca.dateFromKey(startKey), PainelDoca.dateFromKey(endKey));
      }
      return itemDays;
    };

    PainelDoca.groupDaily = function (items) {
      const days = PainelDoca.getChartDays(items);
      const groups = PainelDoca.unique(items.map(item => PainelDoca.groupNameFor(item)));
      const data = {};
      for (const day of days) {
        data[day] = {};
        for (const group of groups) data[day][group] = 0;
      }
      for (const item of items) {
        const day = PainelDoca.dateKeyFromTs(item.ts);
        const group = PainelDoca.groupNameFor(item);
        if (!day || !data[day]) continue;
        data[day][group] = (data[day][group] || 0) + 1;
      }
      return { days, groups, data };
    };

    PainelDoca.groupTotal = function (items) {
      const totals = {};
      for (const item of items) {
        const group = PainelDoca.groupNameFor(item);
        totals[group] = (totals[group] || 0) + 1;
      }
      return Object.entries(totals).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'pt-BR'));
    };

    PainelDoca.svg = function (tag, attrs) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
      return el;
    };

    PainelDoca.showTooltip = function (event, html) {
      const t = document.getElementById('tooltip');
      t.innerHTML = html;
      t.style.left = event.clientX + 'px';
      t.style.top = event.clientY + 'px';
      t.style.opacity = '1';
    };

    PainelDoca.hideTooltip = function () {
      document.getElementById('tooltip').style.opacity = '0';
    };

    PainelDoca.niceTicks = function (max) {
      max = Math.max(1, max);
      const step = Math.ceil(max / 4);
      const ticks = [];
      for (let i = 0; i <= 4; i++) ticks.push(step * i);
      return ticks;
    };

    PainelDoca.drawGrid = function (svg, width, height, margin, max) {
      const plotH = height - margin.top - margin.bottom;
      const ticks = PainelDoca.niceTicks(max);
      const tickMax = Math.max(...ticks);
      for (const value of ticks) {
        const y = margin.top + plotH - (value / tickMax) * plotH;
        svg.appendChild(PainelDoca.svg('line', { x1: margin.left, y1: y, x2: width - margin.right, y2: y, stroke: '#e5e7eb', 'stroke-width': 1 }));
        const txt = PainelDoca.svg('text', { x: margin.left - 10, y: y + 4, 'text-anchor': 'end', 'font-size': 11, fill: '#6b7280' });
        txt.textContent = value;
        svg.appendChild(txt);
      }
    };

    PainelDoca.renderLegend = function (groups) {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      const limited = groups.slice(0, 28);
      for (const group of limited) {
        const item = document.createElement('div');
        item.className = 'legendItem';
        const dot = document.createElement('span');
        dot.className = 'legendDot';
        dot.style.background = PainelDoca.colorFor(group);
        const txt = document.createElement('span');
        txt.textContent = document.getElementById('groupBy').value === 'usuario' ? PainelDoca.shortUserName(group) : group;
        txt.title = group;
        item.appendChild(dot);
        item.appendChild(txt);
        legend.appendChild(item);
      }
      if (groups.length > limited.length) {
        const more = document.createElement('div');
        more.className = 'legendItem';
        more.textContent = `+ ${groups.length - limited.length} grupo(s)`;
        legend.appendChild(more);
      }
    };

    PainelDoca.getResolvedChartMode = function (items) {
      const selected = document.getElementById('chartMode').value;
      if (selected !== 'auto') return selected;
      if (PainelDoca.state.mode === 'week') return 'bar';
      if (PainelDoca.state.mode === 'month') return 'line';
      if (PainelDoca.state.mode === 'all') return 'total';
      const days = PainelDoca.getChartDays(items).length;
      if (days <= 10) return 'bar';
      if (days <= 120) return 'line';
      return 'total';
    };

    PainelDoca.renderBarChart = function (items) {
      const chart = document.getElementById('chart');
      const grouped = PainelDoca.groupDaily(items);
      const days = grouped.days;
      const groups = grouped.groups;
      const today = PainelDoca.todayKey();
      chart.innerHTML = '';
      if (!groups.length || !days.length) {
        chart.innerHTML = '<div class="empty">Nenhum chamado neste período.</div>';
        PainelDoca.renderLegend([]);
        return;
      }
      PainelDoca.renderLegend(groups);
      const wrap = chart.parentElement;
      const manyDays = days.length > 10;
      const availableWidth = Math.max(720, wrap.clientWidth - 8);
      const groupMin = manyDays ? Math.max(38, groups.length * 13) : Math.max(92, groups.length * 30);
      const width = Math.max(availableWidth, days.length * groupMin);
      const height = Math.max(430, chart.clientHeight || 450);
      const margin = { top: 28, right: 28, bottom: manyDays ? 72 : 58, left: 46 };
      const plotW = width - margin.left - margin.right;
      const plotH = height - margin.top - margin.bottom;
      const max = Math.max(1, ...days.flatMap(day => groups.map(group => grouped.data[day]?.[group] || 0)));
      const svg = PainelDoca.svg('svg', { viewBox: `0 0 ${width} ${height}` });
      PainelDoca.drawGrid(svg, width, height, margin, max);
      const groupW = plotW / days.length;
      const gap = manyDays ? 7 : 12;
      const innerW = Math.max(10, groupW - gap);
      const barGap = manyDays ? 3 : 5;

      days.forEach((day, dayIndex) => {
        if (day !== today) return;
        const x = margin.left + dayIndex * groupW + 3;
        svg.appendChild(PainelDoca.svg('rect', { x, y: margin.top - 12, width: Math.max(18, groupW - 6), height: plotH + 22, rx: 15, fill: '#dbeafe', opacity: 0.72 }));
      });

      days.forEach((day, dayIndex) => {
        const groupX = margin.left + dayIndex * groupW + gap / 2;

        // v10.1: compacta as barras por dia.
        // Antes a posição era baseada em todos os grupos do período; se um usuário não tinha chamado no dia,
        // o "slot" dele ficava vazio e criava aquele espaço gigante entre as barras.
        const presentGroups = groups.filter(group => (grouped.data[day]?.[group] || 0) > 0);
        const dayBarCount = Math.max(1, presentGroups.length);
        const dayBarW = Math.max(5, Math.min(manyDays ? 18 : 34, (innerW - (dayBarCount - 1) * barGap) / dayBarCount));
        const totalBarsW = presentGroups.length ? presentGroups.length * dayBarW + (presentGroups.length - 1) * barGap : 0;
        const startX = groupX + (innerW - totalBarsW) / 2;

        presentGroups.forEach((group, groupIndex) => {
          const value = grouped.data[day]?.[group] || 0;
          const h = Math.max(4, (value / max) * plotH);
          const x = startX + groupIndex * (dayBarW + barGap);
          const y = margin.top + plotH - h;
          const rect = PainelDoca.svg('rect', { x, y, width: dayBarW, height: h, rx: manyDays ? 5 : 8, fill: PainelDoca.colorFor(group) });
          rect.addEventListener('mousemove', function (event) {
            PainelDoca.showTooltip(event, `<strong>${PainelDoca.escapeHTML(group)}</strong><br>${PainelDoca.fullDateLabel(day)} • ${value} chamado(s)`);
          });
          rect.addEventListener('mouseleave', PainelDoca.hideTooltip);
          svg.appendChild(rect);
          if (!manyDays) {
            const txt = PainelDoca.svg('text', { x: x + dayBarW / 2, y: y - 7, 'text-anchor': 'middle', 'font-size': 11, 'font-weight': 950, fill: '#111827' });
            txt.textContent = value;
            svg.appendChild(txt);
          }
        });
        const isToday = day === today;
        const labelX = groupX + innerW / 2;
        const labelY = height - (manyDays ? 34 : 28);
        const label = PainelDoca.svg('text', { x: labelX, y: labelY, 'text-anchor': 'middle', 'font-size': manyDays ? 10 : 11, 'font-weight': isToday ? 950 : 500, fill: isToday ? '#2563eb' : '#6b7280' });
        if (manyDays) {
          label.setAttribute('transform', `rotate(-45 ${labelX} ${labelY})`);
          label.textContent = isToday ? 'Hoje' : PainelDoca.shortDateLabel(day);
        } else {
          label.textContent = isToday ? 'Hoje' : `${PainelDoca.weekdayLabel(day)} ${PainelDoca.shortDateLabel(day)}`;
        }
        svg.appendChild(label);
      });
      chart.appendChild(svg);
    };

    PainelDoca.renderLineChart = function (items) {
      const chart = document.getElementById('chart');
      const grouped = PainelDoca.groupDaily(items);
      const days = grouped.days;
      const groups = grouped.groups;
      const today = PainelDoca.todayKey();
      chart.innerHTML = '';
      if (!groups.length || !days.length) {
        chart.innerHTML = '<div class="empty">Nenhum chamado neste período.</div>';
        PainelDoca.renderLegend([]);
        return;
      }
      PainelDoca.renderLegend(groups);
      const wrap = chart.parentElement;
      const manyDays = days.length > 18;
      const veryManyDays = days.length > 60;
      const availableWidth = Math.max(720, wrap.clientWidth - 8);
      const dayW = veryManyDays ? 18 : manyDays ? 36 : 76;
      const width = Math.max(availableWidth, days.length * dayW);
      const height = Math.max(430, chart.clientHeight || 450);
      const margin = { top: 30, right: 36, bottom: manyDays ? 72 : 58, left: 46 };
      const plotW = width - margin.left - margin.right;
      const plotH = height - margin.top - margin.bottom;
      const max = Math.max(1, ...days.flatMap(day => groups.map(group => grouped.data[day]?.[group] || 0)));
      const svg = PainelDoca.svg('svg', { viewBox: `0 0 ${width} ${height}` });
      PainelDoca.drawGrid(svg, width, height, margin, max);
      const xFor = function (index) { return days.length === 1 ? margin.left + plotW / 2 : margin.left + (index / (days.length - 1)) * plotW; };
      const yFor = function (value) { return margin.top + plotH - (value / max) * plotH; };
      days.forEach((day, index) => {
        if (day !== today) return;
        const x = xFor(index);
        svg.appendChild(PainelDoca.svg('line', { x1: x, y1: margin.top - 12, x2: x, y2: margin.top + plotH + 8, stroke: '#2563eb', 'stroke-width': 2, 'stroke-dasharray': '6 6', opacity: 0.48 }));
      });
      for (const group of groups) {
        const points = days.map((day, index) => ({ day, x: xFor(index), y: yFor(grouped.data[day]?.[group] || 0), value: grouped.data[day]?.[group] || 0 }));
        let d = '';
        for (let i = 0; i < points.length; i++) {
          const p = points[i];
          if (i === 0) d += `M ${p.x} ${p.y}`;
          else {
            const prev = points[i - 1];
            const cx1 = prev.x + (p.x - prev.x) * 0.45;
            const cy1 = prev.y;
            const cx2 = prev.x + (p.x - prev.x) * 0.55;
            const cy2 = p.y;
            d += ` C ${cx1} ${cy1}, ${cx2} ${cy2}, ${p.x} ${p.y}`;
          }
        }
        svg.appendChild(PainelDoca.svg('path', { d, fill: 'none', stroke: PainelDoca.colorFor(group), 'stroke-width': 4, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));
        for (const p of points) {
          if (!p.value && veryManyDays) continue;
          const circle = PainelDoca.svg('circle', { cx: p.x, cy: p.y, r: manyDays ? 4 : 6, fill: '#fff', stroke: PainelDoca.colorFor(group), 'stroke-width': manyDays ? 3 : 4 });
          circle.addEventListener('mousemove', function (event) {
            PainelDoca.showTooltip(event, `<strong>${PainelDoca.escapeHTML(group)}</strong><br>${PainelDoca.fullDateLabel(p.day)} • ${p.value} chamado(s)`);
          });
          circle.addEventListener('mouseleave', PainelDoca.hideTooltip);
          svg.appendChild(circle);
          if (p.value && !manyDays) {
            const txt = PainelDoca.svg('text', { x: p.x, y: p.y - 12, 'text-anchor': 'middle', 'font-size': 11, 'font-weight': 950, fill: '#111827' });
            txt.textContent = p.value;
            svg.appendChild(txt);
          }
        }
      }
      days.forEach((day, index) => {
        const isToday = day === today;
        const x = xFor(index);
        const y = height - (manyDays ? 34 : 28);
        const label = PainelDoca.svg('text', { x, y, 'text-anchor': 'middle', 'font-size': manyDays ? 10 : 11, 'font-weight': isToday ? 950 : 500, fill: isToday ? '#2563eb' : '#6b7280' });
        if (manyDays) {
          label.setAttribute('transform', `rotate(-45 ${x} ${y})`);
          label.textContent = isToday ? 'Hoje' : PainelDoca.shortDateLabel(day);
        } else {
          label.textContent = isToday ? 'Hoje' : `${PainelDoca.weekdayLabel(day)} ${PainelDoca.shortDateLabel(day)}`;
        }
        svg.appendChild(label);
      });
      chart.appendChild(svg);
    };

    PainelDoca.renderTotalChart = function (items) {
      const chart = document.getElementById('chart');
      const totals = PainelDoca.groupTotal(items);
      chart.innerHTML = '';
      PainelDoca.renderLegend(totals.map(([group]) => group));
      if (!totals.length) {
        chart.innerHTML = '<div class="empty">Nenhum chamado para mostrar.</div>';
        return;
      }
      const wrap = chart.parentElement;
      const width = Math.max(760, wrap.clientWidth - 8);
      const height = Math.max(430, Math.min(860, totals.length * 54 + 80, chart.clientHeight || 450));
      const margin = { top: 28, right: 55, bottom: 34, left: 190 };
      const plotW = width - margin.left - margin.right;
      const rowH = Math.min(54, (height - margin.top - margin.bottom) / totals.length);
      const max = Math.max(1, ...totals.map(([, count]) => count));
      const svg = PainelDoca.svg('svg', { viewBox: `0 0 ${width} ${height}` });
      totals.forEach(([group, count], index) => {
        const y = margin.top + index * rowH + 8;
        const w = Math.max(10, (count / max) * plotW);
        const label = PainelDoca.svg('text', { x: margin.left - 12, y: y + 22, 'text-anchor': 'end', 'font-size': 12, 'font-weight': 950, fill: '#374151' });
        label.textContent = document.getElementById('groupBy').value === 'usuario' ? PainelDoca.shortUserName(group) : group;
        svg.appendChild(label);
        svg.appendChild(PainelDoca.svg('rect', { x: margin.left, y, width: plotW, height: 28, rx: 14, fill: '#eef2f7' }));
        const rect = PainelDoca.svg('rect', { x: margin.left, y, width: w, height: 28, rx: 14, fill: PainelDoca.colorFor(group) });
        rect.addEventListener('mousemove', function (event) { PainelDoca.showTooltip(event, `<strong>${PainelDoca.escapeHTML(group)}</strong><br>${count} chamado(s)`); });
        rect.addEventListener('mouseleave', PainelDoca.hideTooltip);
        svg.appendChild(rect);
        const value = PainelDoca.svg('text', { x: Math.min(margin.left + w + 9, width - margin.right + 8), y: y + 20, 'font-size': 12, 'font-weight': 950, fill: '#111827' });
        value.textContent = count;
        svg.appendChild(value);
      });
      chart.appendChild(svg);
    };

    PainelDoca.renderChart = function (items) {
      const mode = PainelDoca.getResolvedChartMode(items);
      if (mode === 'bar') return PainelDoca.renderBarChart(items);
      if (mode === 'line') return PainelDoca.renderLineChart(items);
      PainelDoca.renderTotalChart(items);
    };

    PainelDoca.renderHeader = function () {
      const mode = PainelDoca.state.mode;
      const label = document.getElementById('periodLabel');
      const title = document.getElementById('chartTitle');
      const hint = document.getElementById('chartHint');
      const prev = document.getElementById('prevPeriodBtn');
      const next = document.getElementById('nextPeriodBtn');
      const customRange = document.getElementById('customRange');
      const groupBy = document.getElementById('groupBy').value;
      const groupLabel = PainelDoca.GROUP_LABELS[groupBy] || 'grupo';
      const items = PainelDoca.getVisibleItems();
      const chartMode = PainelDoca.getResolvedChartMode(items);
      for (const btn of document.querySelectorAll('.segmented button')) btn.classList.toggle('active', btn.dataset.mode === mode);
      customRange.classList.toggle('hidden', mode !== 'custom');

      if (mode === 'week') {
        const range = PainelDoca.currentRange();
        const currentWeek = PainelDoca.startOfWeek(new Date());
        title.textContent = chartMode === 'line' ? `Semana por ${groupLabel} em linha` : chartMode === 'total' ? `Resumo da semana por ${groupLabel}` : `Semana por ${groupLabel}`;
        hint.textContent = 'Domingo a sábado, com hoje em destaque.';
        label.textContent = `${PainelDoca.shortDateLabel(range.startKey)} até ${PainelDoca.shortDateLabel(range.endKey)}`;
        prev.disabled = false;
        next.disabled = PainelDoca.toDateInput(PainelDoca.state.weekStart) >= PainelDoca.toDateInput(currentWeek);
        return;
      }

      if (mode === 'month') {
        const currentMonth = PainelDoca.startOfMonth(new Date());
        title.textContent = chartMode === 'bar' ? `Mês por ${groupLabel} em barras` : chartMode === 'total' ? `Resumo do mês por ${groupLabel}` : `Mês por ${groupLabel} em linha`;
        hint.textContent = 'Evolução diária das capturas no mês.';
        label.textContent = PainelDoca.monthName(PainelDoca.state.monthStart);
        prev.disabled = false;
        next.disabled = PainelDoca.toDateInput(PainelDoca.state.monthStart) >= PainelDoca.toDateInput(currentMonth);
        return;
      }

      if (mode === 'custom') {
        const range = PainelDoca.currentRange();
        title.textContent = chartMode === 'bar' ? `Período por ${groupLabel} em barras` : chartMode === 'total' ? `Resumo do período por ${groupLabel}` : `Período por ${groupLabel} em linha`;
        if (range.startKey && range.endKey) label.textContent = `${PainelDoca.shortDateLabel(range.startKey)} até ${PainelDoca.shortDateLabel(range.endKey)}`;
        else if (range.startKey) label.textContent = `Desde ${PainelDoca.shortDateLabel(range.startKey)}`;
        else if (range.endKey) label.textContent = `Até ${PainelDoca.shortDateLabel(range.endKey)}`;
        else label.textContent = 'Personalizado';
        hint.textContent = 'Use as datas para filtrar qualquer intervalo.';
        prev.disabled = true;
        next.disabled = true;
        return;
      }

      title.textContent = `Tudo por ${groupLabel}`;
      hint.textContent = 'Todos os chamados carregados.';
      label.textContent = 'Todos os registros';
      prev.disabled = true;
      next.disabled = true;
    };

    PainelDoca.renderRanking = function (items) {
      const box = document.getElementById('ranking');
      const totalEl = document.getElementById('summaryTotal');
      const totals = PainelDoca.groupTotal(items);
      const totalCount = totals.reduce((sum, [, count]) => sum + count, 0);
      const max = Math.max(1, ...totals.map(([, count]) => count));
      const groupBy = document.getElementById('groupBy').value;
      const groupLabel = PainelDoca.GROUP_LABELS[groupBy] || 'grupo';
      document.getElementById('summaryMeta').textContent = `${totals.length} ${groupLabel}(s)`;
      if (PainelDoca.state.lastTotalCount < totalCount) {
        totalEl.classList.remove('pulse');
        void totalEl.offsetWidth;
        totalEl.classList.add('pulse');
      }
      totalEl.textContent = totalCount;
      if (!totals.length) {
        box.innerHTML = '<div class="empty">Sem dados.</div>';
        PainelDoca.state.lastTotals = new Map();
        PainelDoca.state.lastTotalCount = totalCount;
        return;
      }
      const previousTotals = PainelDoca.state.lastTotals;
      const nextTotals = new Map(totals);
      const frag = document.createDocumentFragment();
      for (const [group, count] of totals) {
        const item = document.createElement('div');
        item.className = 'rankItem';
        const name = document.createElement('div');
        name.className = 'rankName';
        const dot = document.createElement('span');
        dot.className = 'colorDot';
        dot.style.background = PainelDoca.colorFor(group);
        const text = document.createElement('span');
        text.textContent = groupBy === 'usuario' ? PainelDoca.shortUserName(group) : group;
        text.title = group;
        name.appendChild(dot);
        name.appendChild(text);
        const value = document.createElement('div');
        value.className = 'rankValue';
        if ((previousTotals.get(group) || 0) < count) value.classList.add('pulse');
        value.textContent = count;
        const track = document.createElement('div');
        track.className = 'progressTrack';
        const fill = document.createElement('div');
        fill.className = 'progressFill';
        fill.style.background = PainelDoca.colorFor(group);
        fill.style.width = `${(count / max) * 100}%`;
        track.appendChild(fill);
        item.appendChild(name);
        item.appendChild(value);
        item.appendChild(track);
        frag.appendChild(item);
      }
      box.innerHTML = '';
      box.appendChild(frag);
      PainelDoca.state.lastTotals = nextTotals;
      PainelDoca.state.lastTotalCount = totalCount;
    };

    PainelDoca.highlightAccessKey = function (key) {
      key = PainelDoca.onlyDigits(key);
      if (key.length !== 44) return PainelDoca.escapeHTML(key || '—');
      const p1 = key.slice(0, 6);
      const cnpj = key.slice(6, 20);
      const p2 = key.slice(20, 25);
      const numero = key.slice(25, 34);
      const p3 = key.slice(34);
      return [
        PainelDoca.escapeHTML(p1),
        '<span class="keyCnpj" title="CNPJ emitente">' + PainelDoca.escapeHTML(cnpj) + '</span>',
        PainelDoca.escapeHTML(p2),
        '<span class="keyNum" title="Número da NF">' + PainelDoca.escapeHTML(numero) + '</span>',
        PainelDoca.escapeHTML(p3)
      ].join('');
    };

    PainelDoca.buildTableRow = function (item) {
      const tr = document.createElement('tr');
      const link = `https://asp.infradesk.app/backend/chamados/detalhes/${encodeURIComponent(item.id)}`;
      tr.innerHTML = `
        <td><a class="idLink" href="${link}" target="_blank" rel="noopener">${PainelDoca.escapeHTML(item.id)}</a></td>
        <td class="dateCell">${item.reservaDataTexto ? PainelDoca.escapeHTML(item.reservaDataTexto).replace(' ', '<br>') : '<span class="muted">—</span>'}</td>
        <td class="dateCell">${item.aberturaTexto ? PainelDoca.escapeHTML(item.aberturaTexto).replace(' ', '<br>') : '<span class="muted">—</span>'}</td>
        <td><strong>${PainelDoca.escapeHTML(item.lojaTexto || '—')}</strong>${item.lojaCodigo ? '<div class="muted">Loja ' + PainelDoca.escapeHTML(item.lojaCodigo) + '</div>' : ''}</td>
        <td><div class="supplier">${PainelDoca.escapeHTML(item.fornecedorNome || '—')}</div>${item.cnpjEmitente ? '<div class="muted">CNPJ: ' + PainelDoca.escapeHTML(item.cnpjEmitenteFormatado || PainelDoca.formatCnpj(item.cnpjEmitente)) + '</div>' : ''}${item.nfNumero ? '<div class="muted">NF: ' + PainelDoca.escapeHTML(item.nfNumero) + '</div>' : ''}</td>
        <td><span class="subcat">${PainelDoca.escapeHTML(item.subcategoria || '—')}</span></td>
        <td><span class="statusPill">${PainelDoca.escapeHTML(item.statusNome || '—')}</span></td>
        <td><div class="keyWrap"><div class="keyText">${PainelDoca.highlightAccessKey(item.chaveAcesso)}</div><button class="copyBtn" type="button" data-copy="${PainelDoca.escapeHTML(item.chaveAcesso || '')}">Copiar chave</button></div></td>
        <td><span class="userPill" title="${PainelDoca.escapeHTML(item.usuario || '—')}" style="background:${PainelDoca.colorFor(item.usuario)};color:${PainelDoca.textColorFor(item.usuario)};">${PainelDoca.escapeHTML(PainelDoca.shortUserName(item.usuario) || '—')}</span></td>
      `;
      return tr;
    };

    PainelDoca.renderTable = function (items) {
      const body = document.getElementById('tableBody');
      const search = PainelDoca.norm(document.getElementById('searchInput').value);
      let rows = [...items];
      if (search) {
        rows = rows.filter(item => PainelDoca.norm([
          item.id, item.usuario, item.lojaTexto, item.fornecedorNome, item.subcategoria, item.statusNome, item.chaveAcesso, item.cnpjEmitente, item.nfNumero
        ].join(' ')).includes(search));
      }
      document.getElementById('detailsHint').textContent = `${rows.length} chamado(s).`;
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="9" class="empty">Nenhum ID para mostrar.</td></tr>';
        return;
      }
      const frag = document.createDocumentFragment();
      for (const item of rows) frag.appendChild(PainelDoca.buildTableRow(item));
      body.innerHTML = '';
      body.appendChild(frag);
    };

    PainelDoca.renderChips = function (boxId, values, selectedSet, touchedName, colorByUser) {
      const box = document.getElementById(boxId);
      const meta = document.getElementById(boxId === 'usersBox' ? 'usersMeta' : 'storesMeta');
      const singular = boxId === 'usersBox' ? 'usuário' : 'loja';
      const plural = boxId === 'usersBox' ? 'usuários' : 'lojas';
      if (!PainelDoca.state[touchedName]) {
        selectedSet.clear();
        values.forEach(v => selectedSet.add(v));
      }
      for (const value of [...selectedSet]) if (!values.includes(value)) selectedSet.delete(value);
      const count = PainelDoca.state[touchedName] ? values.filter(v => selectedSet.has(v)).length : values.length;
      meta.textContent = !values.length ? `Sem ${plural}` : count === values.length ? `Todos (${values.length})` : count === 0 ? `Nenhum ${singular}` : `${count} de ${values.length}`;
      box.innerHTML = '';
      if (!values.length) {
        box.innerHTML = `<span class="hint">Sem ${plural} ainda</span>`;
        return;
      }
      for (const value of values) {
        const checked = selectedSet.has(value);
        const label = document.createElement('label');
        label.className = 'chip' + (checked ? ' active' : '');
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = checked;
        input.addEventListener('change', function () {
          PainelDoca.state[touchedName] = true;
          if (input.checked) selectedSet.add(value);
          else selectedSet.delete(value);
          PainelDoca.scheduleRender();
        });
        const dot = document.createElement('span');
        dot.className = 'colorDot';
        dot.style.background = colorByUser ? PainelDoca.colorFor(value) : '#1a82cd';
        const text = document.createElement('span');
        text.textContent = colorByUser ? PainelDoca.shortUserName(value) : value;
        text.title = value;
        label.appendChild(input);
        label.appendChild(dot);
        label.appendChild(text);
        box.appendChild(label);
      }
    };

    PainelDoca.renderFilterOptions = function () {
      PainelDoca.renderChips('usersBox', PainelDoca.getAllUsers(), PainelDoca.state.selectedUsers, 'touchedUsers', true);
      PainelDoca.renderChips('storesBox', PainelDoca.getAllStores(), PainelDoca.state.selectedStores, 'touchedStores', false);
      const select = document.getElementById('filterSubcategoria');
      const current = select.value;
      const values = PainelDoca.getAllSubcategories();
      select.innerHTML = '<option value="">Todas</option>';
      for (const value of values) {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      }
      if (values.includes(current)) select.value = current;
    };

    PainelDoca.render = function () {
      PainelDoca.renderFilterOptions();
      PainelDoca.renderHeader();
      const items = PainelDoca.getVisibleItems();
      PainelDoca.renderChart(items);
      PainelDoca.renderRanking(items);
      if (PainelDoca.state.detailsVisible) PainelDoca.renderTable(items);
    };

    PainelDoca.scheduleRender = function () {
      if (PainelDoca.state.renderFrame) cancelAnimationFrame(PainelDoca.state.renderFrame);
      PainelDoca.state.renderFrame = requestAnimationFrame(function () {
        PainelDoca.state.renderFrame = null;
        PainelDoca.render();
      });
    };

    PainelDoca.setStatus = function (ok, text) {
      const dot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      dot.className = 'dot ' + (ok ? 'ok' : 'err');
      statusText.textContent = text;
    };

    PainelDoca.fetchSnapshot = async function (useServerDateFilter) {
      const res = await fetch(PainelDoca.firebaseUrl(useServerDateFilter), { cache: 'no-store' });
      let data = null;
      try { data = await res.json(); }
      catch (_) { throw new Error(`Resposta inválida do Firebase. HTTP ${res.status}`); }
      if (!res.ok || (data && data.error)) {
        const message = (data && data.error) || `HTTP ${res.status}`;
        const error = new Error(message);
        error.status = res.status;
        error.firebasePayload = data;
        throw error;
      }
      return data || {};
    };

    PainelDoca.showLoadError = function (error) {
      document.getElementById('chart').innerHTML = `<div class="empty">Não consegui carregar o Firebase.<br><span class="muted">${PainelDoca.escapeHTML(error && error.message ? error.message : 'Erro desconhecido')}</span></div>`;
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty">Erro ao carregar dados.</td></tr>';
    };

    PainelDoca.loadInitial = async function () {
      if (PainelDoca.state.eventSource) {
        PainelDoca.state.eventSource.close();
        PainelDoca.state.eventSource = null;
      }
      PainelDoca.state.hasInitialLoad = false;
      try {
        PainelDoca.setStatus(false, 'Carregando turbo...');
        const data = await PainelDoca.fetchSnapshot(true);
        PainelDoca.state.queryMode = 'turbo';
        PainelDoca.state.byId = PainelDoca.normalizeSnapshot(data || {});
        PainelDoca.state.hasInitialLoad = true;
        PainelDoca.setStatus(true, 'Online turbo');
        PainelDoca.state.lastTotalCount = 0;
        PainelDoca.state.lastTotals = new Map();
        PainelDoca.scheduleRender();
        PainelDoca.connectRealtime(true);
      } catch (turboError) {
        console.warn('Modo turbo do Firebase falhou. Tentando modo seguro sem filtro por índice:', turboError);
        try {
          PainelDoca.setStatus(false, 'Modo seguro...');
          const data = await PainelDoca.fetchSnapshot(false);
          PainelDoca.state.queryMode = 'seguro';
          PainelDoca.state.byId = PainelDoca.normalizeSnapshot(data || {});
          PainelDoca.state.hasInitialLoad = true;
          PainelDoca.setStatus(true, 'Online seguro');
          PainelDoca.toast('Modo seguro: confira .indexOn capturadoEm');
          PainelDoca.state.lastTotalCount = 0;
          PainelDoca.state.lastTotals = new Map();
          PainelDoca.scheduleRender();
          PainelDoca.connectRealtime(false);
        } catch (safeError) {
          console.error('Erro ao carregar Firebase:', safeError);
          PainelDoca.state.byId = {};
          PainelDoca.setStatus(false, 'Erro');
          PainelDoca.showLoadError(safeError);
        }
      }
    };

    PainelDoca.applyRemoteItem = function (id, item) {
      const normalized = PainelDoca.normalizeItem(id, item);
      if (!normalized) delete PainelDoca.state.byId[id];
      else PainelDoca.state.byId[normalized.id] = normalized;
    };

    PainelDoca.handleFirebaseEvent = function (raw, eventType) {
      let payload;
      try { payload = JSON.parse(raw || '{}'); }
      catch (_) { return; }
      const path = String(payload.path || '/');
      const data = payload.data;
      const parts = path.replace(/^\/+/, '').split('/').filter(Boolean);
      if ((path === '/' || path === '') && eventType === 'put') {
        if (!PainelDoca.state.hasInitialLoad) {
          PainelDoca.state.byId = PainelDoca.normalizeSnapshot(data || {});
          PainelDoca.state.hasInitialLoad = true;
          PainelDoca.setStatus(true, 'Online');
          PainelDoca.scheduleRender();
        }
        return;
      }
      if ((path === '/' || path === '') && eventType === 'patch') {
        for (const [childId, childData] of Object.entries(data || {})) {
          if (childData === null) delete PainelDoca.state.byId[childId];
          else PainelDoca.applyRemoteItem(childId, childData);
        }
        PainelDoca.setStatus(true, 'Online');
        PainelDoca.scheduleRender();
        return;
      }
      const id = PainelDoca.clean(parts[0]);
      if (!id) return;
      if (data === null) delete PainelDoca.state.byId[id];
      else if (parts.length === 1) PainelDoca.applyRemoteItem(id, data);
      else {
        const current = Object.assign({}, PainelDoca.state.byId[id] || { chamadoId: id });
        current[parts[1]] = data;
        PainelDoca.applyRemoteItem(id, current);
      }
      PainelDoca.setStatus(true, 'Online');
      PainelDoca.scheduleRender();
    };

    PainelDoca.connectRealtime = function (useServerDateFilter) {
      if (PainelDoca.state.eventSource) PainelDoca.state.eventSource.close();
      try {
        const es = new EventSource(PainelDoca.firebaseUrl(useServerDateFilter !== false));
        es.addEventListener('put', function (event) { PainelDoca.handleFirebaseEvent(event.data, 'put'); });
        es.addEventListener('patch', function (event) { PainelDoca.handleFirebaseEvent(event.data, 'patch'); });
        es.onerror = function () { PainelDoca.setStatus(false, 'Reconectando...'); };
        PainelDoca.state.eventSource = es;
      } catch (error) {
        console.error('Erro no realtime:', error);
        PainelDoca.setStatus(false, 'Erro');
      }
    };

    PainelDoca.reloadForRange = function () {
      clearTimeout(PainelDoca.state.reloadTimer);
      PainelDoca.state.reloadTimer = setTimeout(PainelDoca.loadInitial, 220);
      PainelDoca.scheduleRender();
    };

    PainelDoca.setMode = function (mode) {
      PainelDoca.state.mode = mode;
      PainelDoca.state.lastTotalCount = 0;
      PainelDoca.state.lastTotals = new Map();
      PainelDoca.loadInitial();
      PainelDoca.scheduleRender();
    };

    PainelDoca.prevPeriod = function () {
      if (PainelDoca.state.mode === 'week') PainelDoca.state.weekStart = PainelDoca.addDays(PainelDoca.state.weekStart, -7);
      if (PainelDoca.state.mode === 'month') PainelDoca.state.monthStart = PainelDoca.addMonths(PainelDoca.state.monthStart, -1);
      PainelDoca.state.lastTotalCount = 0;
      PainelDoca.state.lastTotals = new Map();
      PainelDoca.loadInitial();
      PainelDoca.scheduleRender();
    };

    PainelDoca.nextPeriod = function () {
      if (PainelDoca.state.mode === 'week') {
        const currentWeek = PainelDoca.startOfWeek(new Date());
        const next = PainelDoca.addDays(PainelDoca.state.weekStart, 7);
        if (PainelDoca.toDateInput(next) <= PainelDoca.toDateInput(currentWeek)) PainelDoca.state.weekStart = next;
      }
      if (PainelDoca.state.mode === 'month') {
        const currentMonth = PainelDoca.startOfMonth(new Date());
        const next = PainelDoca.addMonths(PainelDoca.state.monthStart, 1);
        if (PainelDoca.toDateInput(next) <= PainelDoca.toDateInput(currentMonth)) PainelDoca.state.monthStart = next;
      }
      PainelDoca.state.lastTotalCount = 0;
      PainelDoca.state.lastTotals = new Map();
      PainelDoca.loadInitial();
      PainelDoca.scheduleRender();
    };

    PainelDoca.toggleDetails = function () {
      PainelDoca.state.detailsVisible = !PainelDoca.state.detailsVisible;
      document.getElementById('detailsPanel').classList.toggle('hidden', !PainelDoca.state.detailsVisible);
      document.getElementById('toggleDetailsBtn').textContent = PainelDoca.state.detailsVisible ? 'Ocultar IDs' : 'Ver IDs';
      if (PainelDoca.state.detailsVisible) PainelDoca.renderTable(PainelDoca.getVisibleItems());
    };

    PainelDoca.toggleSummary = function () {
      PainelDoca.state.summaryVisible = !PainelDoca.state.summaryVisible;
      document.getElementById('summaryPanel').classList.toggle('hidden', !PainelDoca.state.summaryVisible);
      document.getElementById('mainGrid').classList.toggle('noSummary', !PainelDoca.state.summaryVisible);
      document.getElementById('summaryToggleBtn').textContent = PainelDoca.state.summaryVisible ? 'Ocultar resumo' : 'Mostrar resumo';
      PainelDoca.scheduleRender();
    };

    PainelDoca.clearFilters = function () {
      document.getElementById('searchGeneral').value = '';
      document.getElementById('searchChamado').value = '';
      document.getElementById('searchNf').value = '';
      document.getElementById('searchCnpj').value = '';
      document.getElementById('filterSubcategoria').value = '';
      document.getElementById('searchInput').value = '';
      PainelDoca.state.touchedUsers = false;
      PainelDoca.state.touchedStores = false;
      PainelDoca.state.selectedUsers.clear();
      PainelDoca.state.selectedStores.clear();
      PainelDoca.state.lastTotalCount = 0;
      PainelDoca.state.lastTotals = new Map();
      PainelDoca.scheduleRender();
    };

    PainelDoca.copyText = async function (text) {
      text = PainelDoca.clean(text);
      if (!text) return;
      try { await navigator.clipboard.writeText(text); }
      catch (_) {
        const input = document.createElement('textarea');
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        input.remove();
      }
      PainelDoca.toast('Chave copiada');
    };

    PainelDoca.toast = function (message) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(PainelDoca.toastTimer);
      PainelDoca.toastTimer = setTimeout(function () { el.classList.remove('show'); }, 1500);
    };

    PainelDoca.exportCsv = function () {
      const rows = PainelDoca.getVisibleItems();
      const header = ['chamadoId', 'reservadoEm', 'aberturaTexto', 'lojaTexto', 'fornecedorNome', 'subcategoria', 'statusNome', 'chaveAcesso', 'cnpjEmitente', 'nfNumero', 'usuario'];
      const lines = [header.join(';')];
      for (const item of rows) {
        const values = [item.id, item.reservaDataTexto, item.aberturaTexto, item.lojaTexto, item.fornecedorNome, item.subcategoria, item.statusNome, item.chaveAcesso, item.cnpjEmitente, item.nfNumero, item.usuario]
          .map(value => '"' + PainelDoca.clean(value).replace(/"/g, '""') + '"');
        lines.push(values.join(';'));
      }
      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'infra-doca-capturas-graficos.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    };

    PainelDoca.bind = function () {
      document.getElementById('modeWeek').addEventListener('click', () => PainelDoca.setMode('week'));
      document.getElementById('modeMonth').addEventListener('click', () => PainelDoca.setMode('month'));
      document.getElementById('modeCustom').addEventListener('click', () => PainelDoca.setMode('custom'));
      document.getElementById('modeAll').addEventListener('click', () => PainelDoca.setMode('all'));
      document.getElementById('prevPeriodBtn').addEventListener('click', PainelDoca.prevPeriod);
      document.getElementById('nextPeriodBtn').addEventListener('click', PainelDoca.nextPeriod);
      document.getElementById('dateFrom').addEventListener('change', PainelDoca.reloadForRange);
      document.getElementById('dateTo').addEventListener('change', PainelDoca.reloadForRange);
      ['searchGeneral', 'searchChamado', 'searchNf', 'searchCnpj', 'filterSubcategoria', 'groupBy', 'chartMode'].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('input', function () {
          PainelDoca.state.lastTotalCount = 0;
          PainelDoca.state.lastTotals = new Map();
          PainelDoca.scheduleRender();
        });
        el.addEventListener('change', function () {
          PainelDoca.state.lastTotalCount = 0;
          PainelDoca.state.lastTotals = new Map();
          PainelDoca.scheduleRender();
        });
      });
      document.getElementById('searchInput').addEventListener('input', function () {
        PainelDoca.renderTable(PainelDoca.getVisibleItems());
      });
      document.getElementById('clearBtn').addEventListener('click', PainelDoca.clearFilters);
      document.getElementById('reloadBtn').addEventListener('click', PainelDoca.loadInitial);
      document.getElementById('toggleDetailsBtn').addEventListener('click', PainelDoca.toggleDetails);
      document.getElementById('summaryToggleBtn').addEventListener('click', PainelDoca.toggleSummary);
      document.getElementById('exportBtn').addEventListener('click', PainelDoca.exportCsv);
      document.addEventListener('click', function (event) {
        const btn = event.target.closest('[data-copy]');
        if (btn) PainelDoca.copyText(btn.getAttribute('data-copy') || '');
      });
      window.addEventListener('resize', PainelDoca.scheduleRender);
      window.addEventListener('beforeunload', function () {
        if (PainelDoca.state.eventSource) PainelDoca.state.eventSource.close();
      });
    };

    PainelDoca.start = function () {
      const now = new Date();
      PainelDoca.state.weekStart = PainelDoca.startOfWeek(now);
      PainelDoca.state.monthStart = PainelDoca.startOfMonth(now);
      const range = PainelDoca.currentRange();
      document.getElementById('dateFrom').value = range.startKey;
      document.getElementById('dateTo').value = range.endKey;
      PainelDoca.bind();
      PainelDoca.render();
      PainelDoca.loadInitial();
    };

    PainelDoca.start();
  </script>
</body>
</html>
