<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Comprinhas Chat</title>

  <style>
    :root {
      --bg: #eef4fb;
      --card: #ffffff;
      --line: #dbe7f3;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --mine: #dbeafe;
      --theirs: #ffffff;
      --danger: #dc2626;
      --star: #f59e0b;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.14), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, textarea, input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      width: min(960px, 100%);
      height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: rgba(255, 255, 255, 0.45);
      border-left: 1px solid rgba(219, 231, 243, 0.75);
      border-right: 1px solid rgba(219, 231, 243, 0.75);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .avatar {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      font-size: 24px;
      flex: 0 0 auto;
    }

    .top-info {
      min-width: 0;
      flex: 1;
    }

    .peer-name {
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .peer-status {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill-btn {
      border-radius: 999px;
      padding: 9px 12px;
      color: #1d4ed8;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      font-weight: 700;
    }

    .notify-badge {
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      display: none;
      place-items: center;
      background: #dc2626;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 8px 20px rgba(220, 38, 38, 0.28);
    }

    .notify-badge.visible {
      display: grid;
    }

    .messages {
      overflow-y: auto;
      padding: 12px 12px 16px;
      scroll-behavior: smooth;
    }

    .load-more {
      display: flex;
      justify-content: center;
      margin: 6px 0 14px;
    }

    .load-more button {
      border-radius: 999px;
      padding: 8px 14px;
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--primary);
      font-weight: 700;
    }

    .msg-row {
      display: flex;
      margin-bottom: 8px;
    }

    .msg-row.mine {
      justify-content: flex-end;
    }

    .msg-row.theirs {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(680px, 82%);
      padding: 9px 10px;
      border-radius: 16px;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.05);
      border: 1px solid rgba(219, 231, 243, 0.9);
      word-break: break-word;
    }

    .mine .bubble {
      background: var(--mine);
      border-bottom-right-radius: 5px;
    }

    .theirs .bubble {
      background: var(--theirs);
      border-bottom-left-radius: 5px;
    }

    .author {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .reply-box {
      border-left: 3px solid var(--primary);
      background: rgba(255, 255, 255, 0.58);
      border-radius: 10px;
      padding: 7px 8px;
      margin: 2px 0 7px;
      font-size: 12px;
      color: #334155;
    }

    .reply-box strong {
      display: block;
      color: #1e40af;
      margin-bottom: 2px;
    }

    .sticker {
      font-size: 44px;
      line-height: 1.05;
      padding: 5px 0;
      text-align: center;
    }

    .audio-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 13px;
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-weight: 800;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      user-select: none;
    }

    .read {
      color: var(--primary);
      font-weight: 900;
    }

    .marked {
      color: var(--star);
    }

    .bubble-actions {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
      margin-top: 6px;
      opacity: 0.72;
    }

    .bubble:hover .bubble-actions {
      opacity: 1;
    }

    .mini {
      width: 28px;
      height: 26px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(148, 163, 184, 0.35);
      color: #334155;
      display: grid;
      place-items: center;
    }

    .mini.danger {
      color: var(--danger);
    }

    .reply-preview {
      padding: 9px 12px;
      margin: 8px 10px 0;
      border-radius: 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .reply-preview.visible {
      display: flex;
    }

    .reply-preview-text {
      flex: 1;
      min-width: 0;
      font-size: 13px;
      color: #1e3a8a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .composer {
      padding: 10px;
      background: rgba(255, 255, 255, 0.94);
      border-top: 1px solid var(--line);
    }

    .composer-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      display: grid;
      place-items: center;
      font-size: 21px;
      flex: 0 0 auto;
    }

    textarea {
      width: 100%;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid #cbd5e1;
      outline: 0;
      background: #fff;
    }

    textarea:focus,
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .send-btn {
      width: 48px;
      height: 44px;
      border-radius: 15px;
      background: var(--primary);
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    dialog {
      border: 0;
      border-radius: 22px;
      box-shadow: var(--shadow);
      width: min(440px, calc(100% - 28px));
      padding: 0;
      color: var(--text);
    }

    dialog::backdrop {
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(3px);
    }

    .modal {
      padding: 18px;
    }

    .modal h2 {
      margin: 0 0 6px;
      font-size: 21px;
    }

    .modal p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 5px;
      color: #334155;
      font-weight: 700;
      font-size: 13px;
    }

    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 13px;
      padding: 10px 12px;
      outline: 0;
    }

    .choices {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .choice {
      border-radius: 999px;
      padding: 9px 12px;
      background: #fff;
      border: 1px solid #cbd5e1;
      font-weight: 800;
    }

    .choice.active {
      background: #dbeafe;
      border-color: #60a5fa;
      color: #1d4ed8;
    }

    .avatar-grid,
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
      gap: 10px;
      max-height: 45vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    .avatar-option,
    .sticker-option {
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      font-size: 27px;
    }

    .avatar-option.active {
      outline: 3px solid rgba(37, 99, 235, 0.25);
      border-color: #2563eb;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .modal-actions button {
      flex: 1;
      border-radius: 13px;
      padding: 11px;
      font-weight: 800;
    }

    .secondary {
      background: #f8fafc;
      color: #334155;
      border: 1px solid #cbd5e1;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .audio-modal {
      text-align: center;
    }

    .audio-modal audio {
      width: 100%;
      margin-top: 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(20px);
      background: #0f172a;
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: 180ms ease;
      z-index: 20;
      max-width: min(560px, calc(100vw - 24px));
      text-align: center;
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      margin-top: 30vh;
      padding: 0 18px;
    }

    @media (max-width: 560px) {
      .bubble {
        max-width: 90%;
      }

      .pill-btn {
        padding: 8px 10px;
      }

      .topbar {
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div id="peerAvatar" class="avatar">🌙</div>
      <div class="top-info">
        <div id="peerName" class="peer-name">Chat</div>
        <div id="peerStatus" class="peer-status">conectando...</div>
      </div>
      <span id="unreadBadge" class="notify-badge" title="Novas mensagens">0</span>
      <button id="profileBtn" class="pill-btn" type="button">Perfil</button>
    </header>

    <main id="messages" class="messages">
      <div class="empty">Conectando...</div>
    </main>

    <section>
      <div id="replyPreview" class="reply-preview">
        <div class="reply-preview-text" id="replyPreviewText"></div>
        <button id="cancelReplyBtn" class="mini" type="button">✕</button>
      </div>

      <div class="composer">
        <div class="composer-row">
          <button id="stickersBtn" class="icon-btn" type="button" title="Figurinhas">😊</button>
          <textarea id="messageInput" placeholder="Digite uma mensagem..." rows="1"></textarea>
          <button id="sendBtn" class="send-btn" type="button" title="Enviar">➤</button>
        </div>
      </div>
    </section>
  </div>

  <dialog id="profileDialog">
    <div class="modal">
      <h2>Entrar no chat</h2>
      <p>Escolha o perfil deste navegador.</p>

      <div class="choices">
        <button id="chooseSol" class="choice" type="button">🌞 Sol</button>
        <button id="chooseLua" class="choice" type="button">🌙 Lua</button>
      </div>

      <div class="field">
        <label for="profileName">Nome</label>
        <input id="profileName" autocomplete="off" />
      </div>

      <div class="field">
        <label for="profileStatus">Recado/status</label>
        <input id="profileStatus" autocomplete="off" placeholder="Ex: no mercado..." />
      </div>

      <div class="field">
        <label>Avatar</label>
        <div id="avatarGrid" class="avatar-grid"></div>
      </div>

      <div class="modal-actions">
        <button id="saveProfileBtn" class="primary" type="button">Entrar</button>
      </div>
    </div>
  </dialog>

  <dialog id="stickersDialog">
    <div class="modal">
      <h2>Figurinhas</h2>
      <p>Escolha uma reação.</p>
      <div id="stickerGrid" class="sticker-grid"></div>
      <div class="modal-actions">
        <button id="closeStickersBtn" class="secondary" type="button">Fechar</button>
      </div>
    </div>
  </dialog>

  <dialog id="audioDialog">
    <div class="modal audio-modal">
      <h2>Tocando áudio</h2>
      <p id="audioInfo">Preparando...</p>
      <audio id="audioPlayer" controls></audio>
      <div class="modal-actions">
        <button id="stopAudioBtn" class="secondary" type="button">Parar</button>
      </div>
    </div>
  </dialog>

    <audio id="notificationSound" src="../audio/blin.mp3" preload="auto"></audio>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getDatabase,
      ref,
      push,
      set,
      update,
      onValue,
      off,
      onDisconnect,
      serverTimestamp,
      query,
      orderByChild,
      limitToLast
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7L8gJXbTZs2bndQ2_QeCKNmHC9flNhCE",
      authDomain: "lista-compras-pea.firebaseapp.com",
      databaseURL: "https://lista-compras-pea-default-rtdb.firebaseio.com",
      projectId: "lista-compras-pea",
      storageBucket: "lista-compras-pea.firebasestorage.app",
      messagingSenderId: "264853366033",
      appId: "1:264853366033:web:b9ad6860d43ddffaadd8b0"
    };

    const SALA = "salas/pea_001";
    const CHAT_PATH = `${SALA}/chat/mensagens`;
    const USERS_PATH = `${SALA}/usuariosChat`;
    const DEVICES_PATH = `${SALA}/usuariosDispositivos`;

    const avatars = ["🌞", "🌙", "👨", "🧔", "👨‍🦱", "👨‍🦰", "👩", "👩‍🦱", "👩‍🦰", "👩‍🦳"];

    const stickers = [
      "😂", "🤣", "😅", "😆", "😁", "🙃", "🙄", "😒", "😬", "🥴",
      "🤔", "🫣", "😳", "😱", "😭", "🥺", "😴", "🥱", "😡", "😤",
      "🤢", "🤮", "😖", "🤒", "🤧", "😷", "🤕", "🤡", "😎", "👍",
      "👎", "👌", "🙏", "👏", "👀", "🤦", "🤷", "🛒", "🍕", "🍔",
      "🍟", "🥪", "🍫", "🍩", "🍪", "🍗", "🍝", "🥤", "☕", "✅",
      "❌", "⚠️", "⏰"
    ];

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let uidAtual = "";
    let perfil = null;
    let mensagens = [];
    let limiteMensagens = 20;
    let replyingTo = null;
    let messagesRefAtual = null;
    let peerRefAtual = null;
    let currentAudioUrl = null;
    let currentAudioMessage = null;
    let audioFinished = false;

    let primeiraCargaSomMensagem = true;
    let notificationAudioUnlocked = false;
    const mensagensConhecidasSom = new Set();
    const inicioSessaoSomMs = Date.now();

    let novasMensagensNaoLidas = 0;
    let paginaComFoco = !document.hidden;
    const tituloOriginalPagina = document.title || "Comprinhas Chat";

    const el = (id) => document.getElementById(id);

    const messagesEl = el("messages");
    const messageInput = el("messageInput");
    const sendBtn = el("sendBtn");
    const profileBtn = el("profileBtn");
    const profileDialog = el("profileDialog");
    const chooseSol = el("chooseSol");
    const chooseLua = el("chooseLua");
    const profileName = el("profileName");
    const profileStatus = el("profileStatus");
    const avatarGrid = el("avatarGrid");
    const saveProfileBtn = el("saveProfileBtn");
    const peerAvatar = el("peerAvatar");
    const peerName = el("peerName");
    const peerStatus = el("peerStatus");
    const replyPreview = el("replyPreview");
    const replyPreviewText = el("replyPreviewText");
    const cancelReplyBtn = el("cancelReplyBtn");
    const stickersBtn = el("stickersBtn");
    const stickersDialog = el("stickersDialog");
    const stickerGrid = el("stickerGrid");
    const closeStickersBtn = el("closeStickersBtn");
    const audioDialog = el("audioDialog");
    const audioPlayer = el("audioPlayer");
    const audioInfo = el("audioInfo");
    const stopAudioBtn = el("stopAudioBtn");
    const toast = el("toast");
    const notificationSound = el("notificationSound");
    const unreadBadge = el("unreadBadge");

    async function desbloquearSomNotificacao() {
      if (notificationAudioUnlocked || !notificationSound) return;

      try {
        const volumeOriginal = notificationSound.volume || 1;

        notificationSound.volume = 0;
        notificationSound.currentTime = 0;

        await notificationSound.play();

        notificationSound.pause();
        notificationSound.currentTime = 0;
        notificationSound.volume = volumeOriginal;

        notificationAudioUnlocked = true;
      } catch (_) {
        // Navegadores só liberam áudio depois de clique, toque ou tecla.
      }
    }

    function tocarSomNovaMensagem() {
      if (!notificationSound || !notificationAudioUnlocked) return;

      try {
        notificationSound.pause();
        notificationSound.currentTime = 0;
        notificationSound.volume = 1;

        const promise = notificationSound.play();

        if (promise && typeof promise.catch === "function") {
          promise.catch(() => {});
        }
      } catch (_) {}
    }

    function atualizarIndicadorNovasMensagens() {
      if (!unreadBadge) return;

      if (novasMensagensNaoLidas <= 0) {
        unreadBadge.textContent = "0";
        unreadBadge.classList.remove("visible");
        document.title = tituloOriginalPagina;
        return;
      }

      const texto = novasMensagensNaoLidas > 99 ? "99+" : String(novasMensagensNaoLidas);

      unreadBadge.textContent = texto;
      unreadBadge.classList.add("visible");
      document.title = `(${texto}) ${tituloOriginalPagina}`;
    }

    function zerarIndicadorNovasMensagens() {
      novasMensagensNaoLidas = 0;
      atualizarIndicadorNovasMensagens();
    }

    function registrarNovaMensagemRecebidaParaContador() {
      if (paginaComFoco && document.visibilityState === "visible") {
        return;
      }

      novasMensagensNaoLidas += 1;
      atualizarIndicadorNovasMensagens();
    }

    function processarSomNovaMensagem(listaMensagens) {
      if (!perfil) return;

      if (primeiraCargaSomMensagem) {
        listaMensagens.forEach((msg) => {
          mensagensConhecidasSom.add(msg.id);
        });

        primeiraCargaSomMensagem = false;
        return;
      }

      let deveTocar = false;

      listaMensagens.forEach((msg) => {
        if (mensagensConhecidasSom.has(msg.id)) return;

        mensagensConhecidasSom.add(msg.id);

        if (msg.apagada) return;
        if (msg.autorId === perfil.id) return;
        if (msg.criadoEm <= inicioSessaoSomMs) return;

        registrarNovaMensagemRecebidaParaContador();
        deveTocar = true;
      });

      if (deveTocar) {
        tocarSomNovaMensagem();
      }
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");

      window.clearTimeout(showToast._timer);
      showToast._timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 3200);
    }

    function mostrarErroInicial(erro) {
      console.error("Erro ao iniciar chat:", erro);

      messagesEl.innerHTML = "";

      const div = document.createElement("div");
      div.className = "empty";
      div.style.maxWidth = "620px";
      div.style.margin = "22vh auto 0";
      div.style.padding = "18px";
      div.style.background = "#fff";
      div.style.border = "1px solid #fecaca";
      div.style.borderRadius = "18px";
      div.style.color = "#991b1b";

      div.innerHTML = `
        <strong>Não foi possível conectar.</strong><br><br>
        ${String(erro?.message || erro || "Erro desconhecido")}<br><br>
        <span style="color:#64748b">
          Abra por <b>http://localhost:8080</b> ou por HTTPS no GitHub Pages.
        </span>
      `;

      messagesEl.appendChild(div);
    }

    function formatTime(ms) {
      if (!ms || ms <= 0) return "";

      const d = new Date(ms);
      const h = String(d.getHours()).padStart(2, "0");
      const m = String(d.getMinutes()).padStart(2, "0");

      return `${h}:${m}`;
    }

    function formatLastSeen(ms) {
      if (!ms || ms <= 0) return "offline";

      const d = new Date(ms);
      const now = new Date();
      const sameDay =
        d.getFullYear() === now.getFullYear() &&
        d.getMonth() === now.getMonth() &&
        d.getDate() === now.getDate();

      const hora = formatTime(ms);

      if (sameDay) return `visto por último hoje às ${hora}`;

      const dia = String(d.getDate()).padStart(2, "0");
      const mes = String(d.getMonth() + 1).padStart(2, "0");

      return `visto por último ${dia}/${mes} às ${hora}`;
    }

    function profileFromStorage() {
      const id = localStorage.getItem("usuario_chat_id");
      const nome = localStorage.getItem("usuario_chat_nome");
      const emoji = localStorage.getItem("usuario_chat_emoji");
      const recado = localStorage.getItem("usuario_chat_recado");

      if (!id || !nome || !emoji) return null;
      if (id !== "sol" && id !== "lua") return null;

      return {
        id,
        nome,
        emoji,
        recado: recado || "Disponível"
      };
    }

    function saveProfile(profile) {
      localStorage.setItem("usuario_chat_id", profile.id);
      localStorage.setItem("usuario_chat_nome", profile.nome);
      localStorage.setItem("usuario_chat_emoji", profile.emoji);
      localStorage.setItem("usuario_chat_recado", profile.recado || "Disponível");
    }

    function defaultProfile(id) {
      if (id === "lua") {
        return {
          id: "lua",
          nome: "Lua",
          emoji: "🌙",
          recado: "Disponível"
        };
      }

      return {
        id: "sol",
        nome: "Sol",
        emoji: "🌞",
        recado: "Disponível"
      };
    }

    function otherProfileId() {
      return perfil?.id === "sol" ? "lua" : "sol";
    }

    function renderAvatarGrid() {
      avatarGrid.innerHTML = "";

      avatars.forEach((emoji) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "avatar-option";
        btn.textContent = emoji;

        if (profileDialog.dataset.emoji === emoji) {
          btn.classList.add("active");
        }

        btn.addEventListener("click", () => {
          profileDialog.dataset.emoji = emoji;
          renderAvatarGrid();
        });

        avatarGrid.appendChild(btn);
      });
    }

    function setProfileChoice(id) {
      const p = defaultProfile(id);

      profileDialog.dataset.id = p.id;
      profileDialog.dataset.emoji = p.emoji;
      profileName.value = p.nome;
      profileStatus.value = p.recado;

      chooseSol.classList.toggle("active", id === "sol");
      chooseLua.classList.toggle("active", id === "lua");

      renderAvatarGrid();
    }

    function openProfileDialog() {
      const p = perfil || defaultProfile("sol");

      profileDialog.dataset.id = p.id;
      profileDialog.dataset.emoji = p.emoji;
      profileName.value = p.nome;
      profileStatus.value = p.recado || "Disponível";

      chooseSol.classList.toggle("active", p.id === "sol");
      chooseLua.classList.toggle("active", p.id === "lua");

      renderAvatarGrid();

      if (!profileDialog.open) profileDialog.showModal();
    }

    async function salvarPerfilDialog() {
      const id = profileDialog.dataset.id || "sol";
      const nome = profileName.value.trim() || (id === "sol" ? "Sol" : "Lua");
      const emoji = profileDialog.dataset.emoji || (id === "sol" ? "🌞" : "🌙");
      const recado = profileStatus.value.trim() || "Disponível";

      if (perfil) await marcarOffline();

      perfil = { id, nome, emoji, recado };
      saveProfile(perfil);

      profileDialog.close();

      await iniciarChat();
    }

    async function registrarDispositivoWeb() {
      if (!uidAtual) return;

      await set(ref(db, `${DEVICES_PATH}/${uidAtual}`), {
        ativo: true,
        tipo: "web",
        nome: "Navegador",
        plataforma: navigator.platform || "web",
        atualizadoEm: Date.now()
      });
    }

    async function marcarOnline() {
      if (!perfil || !uidAtual) return;

      const userBase = ref(db, `${USERS_PATH}/${perfil.id}`);
      const presenceRef = ref(db, `${USERS_PATH}/${perfil.id}/presenca/${uidAtual}`);

      await update(userBase, {
        nome: perfil.nome,
        emoji: perfil.emoji,
        recado: perfil.recado,
        ativo: true,
        atualizadoEm: serverTimestamp()
      });

      await set(presenceRef, {
        online: true,
        lastSeen: serverTimestamp()
      });

      await onDisconnect(presenceRef).update({
        online: false,
        lastSeen: serverTimestamp()
      });
    }

    async function marcarOffline() {
      if (!perfil || !uidAtual) return;

      try {
        await update(ref(db, `${USERS_PATH}/${perfil.id}/presenca/${uidAtual}`), {
          online: false,
          lastSeen: serverTimestamp()
        });
      } catch (_) {}
    }

    function ouvirOutroUsuario() {
      if (peerRefAtual) off(peerRefAtual);

      const outroId = otherProfileId();
      peerRefAtual = ref(db, `${USERS_PATH}/${outroId}`);

      onValue(peerRefAtual, (snap) => {
        let nome = outroId === "sol" ? "Sol" : "Lua";
        let emoji = outroId === "sol" ? "🌞" : "🌙";
        let recado = "";
        let status = "offline";

        const data = snap.val();

        if (data && typeof data === "object") {
          nome = data.nome || nome;
          emoji = data.emoji || emoji;
          recado = data.recado || "";

          const presenca = data.presenca || {};
          let online = false;
          let lastSeen = 0;

          Object.values(presenca).forEach((item) => {
            if (!item || typeof item !== "object") return;

            if (item.online === true) online = true;

            const visto = Number(item.lastSeen || 0);
            if (visto > lastSeen) lastSeen = visto;
          });

          status = online ? "online agora" : formatLastSeen(lastSeen);
        }

        peerAvatar.textContent = emoji;
        peerName.textContent = nome;
        peerStatus.textContent = recado.trim() ? `${status} - ${recado}` : status;
      });
    }

    function parseMensagem(id, data) {
      const vistoPor = data.vistoPor && typeof data.vistoPor === "object"
        ? data.vistoPor
        : {};

      return {
        id,
        autorId: String(data.autorId || data.autor || ""),
        autorUid: String(data.autorUid || ""),
        autorNome: String(data.autorNome || "Pessoa"),
        autorEmoji: String(data.autorEmoji || ""),
        texto: String(data.texto || ""),
        tipo: String(data.tipo || "texto"),
        criadoEm: Number(data.criadoEm || 0),
        apagada: data.apagada === true,
        marcada: data.marcada === true,
        respostaId: data.respostaId ? String(data.respostaId) : "",
        respostaTexto: data.respostaTexto ? String(data.respostaTexto) : "",
        respostaAutorNome: data.respostaAutorNome ? String(data.respostaAutorNome) : "",
        vistoPor,
        audioDataBase64: data.audioDataBase64 ? String(data.audioDataBase64) : "",
        audioKeyBase64: data.audioKeyBase64 ? String(data.audioKeyBase64) : "",
        audioIvBase64: data.audioIvBase64 ? String(data.audioIvBase64) : "",
        audioDuracaoMs: Number(data.audioDuracaoMs || 0),
        audioTamanhoBytes: Number(data.audioTamanhoBytes || 0)
      };
    }

    function ouvirMensagens() {
      if (messagesRefAtual) off(messagesRefAtual);

      messagesRefAtual = query(
        ref(db, CHAT_PATH),
        orderByChild("criadoEm"),
        limitToLast(limiteMensagens)
      );

      onValue(messagesRefAtual, (snap) => {
        const raw = snap.val() || {};

        const novasMensagens = Object.entries(raw)
          .map(([id, data]) => parseMensagem(id, data || {}))
          .sort((a, b) => a.criadoEm - b.criadoEm);

        mensagens = novasMensagens;

        processarSomNovaMensagem(novasMensagens);
        renderMensagens();
        marcarMensagensComoLidas();
      });
    }

    function resumoMensagem(msg) {
      if (msg.apagada) return "Mensagem apagada";
      if (msg.tipo === "gif") return "Figurinha";
      if (msg.tipo === "audio") return "Áudio";
      if (msg.tipo === "audio_consumido") return "Áudio ouvido";

      const t = msg.texto.trim();
      return t.length <= 80 ? t : `${t.slice(0, 80)}...`;
    }

    function duracaoAudio(ms) {
      if (!ms || ms <= 0) return "00:00";

      const total = Math.round(ms / 1000);
      const min = Math.floor(total / 60);
      const sec = total % 60;

      return `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }

    function renderMensagens() {
      messagesEl.innerHTML = "";

      const load = document.createElement("div");
      load.className = "load-more";

      const loadBtn = document.createElement("button");
      loadBtn.type = "button";
      loadBtn.textContent = `Carregar anteriores (${limiteMensagens})`;
      loadBtn.addEventListener("click", () => {
        limiteMensagens += 20;
        ouvirMensagens();
      });

      load.appendChild(loadBtn);
      messagesEl.appendChild(load);

      if (mensagens.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Nenhuma mensagem ainda.";
        messagesEl.appendChild(empty);
        return;
      }

      mensagens.forEach((msg) => {
        messagesEl.appendChild(criarBubble(msg));
      });

      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function criarBubble(msg) {
      const minha = msg.autorId === perfil.id;

      const row = document.createElement("div");
      row.className = `msg-row ${minha ? "mine" : "theirs"}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (msg.apagada) {
        const deleted = document.createElement("div");
        deleted.textContent = "Mensagem apagada";
        deleted.style.color = "#64748b";
        bubble.appendChild(deleted);
        row.appendChild(bubble);
        return row;
      }

      if (!minha) {
        const author = document.createElement("div");
        author.className = "author";
        author.textContent = `${msg.autorEmoji || ""} ${msg.autorNome}`;
        bubble.appendChild(author);
      }

      if (msg.respostaTexto) {
        const reply = document.createElement("div");
        reply.className = "reply-box";

        const strong = document.createElement("strong");
        strong.textContent = msg.respostaAutorNome || "Resposta";

        const text = document.createElement("div");
        text.textContent = msg.respostaTexto;

        reply.appendChild(strong);
        reply.appendChild(text);
        bubble.appendChild(reply);
      }

      bubble.appendChild(criarConteudoMensagem(msg, minha));

      const meta = document.createElement("div");
      meta.className = "meta";

      if (msg.marcada) {
        const star = document.createElement("span");
        star.className = "marked";
        star.textContent = "★";
        meta.appendChild(star);
      }

      const time = document.createElement("span");
      time.textContent = formatTime(msg.criadoEm);
      meta.appendChild(time);

      if (minha) {
        const read = document.createElement("span");
        const lida = Object.keys(msg.vistoPor || {}).some((uid) => uid !== uidAtual);
        read.className = lida ? "read" : "";
        read.textContent = lida ? "✓✓" : "✓";
        meta.appendChild(read);
      }

      bubble.appendChild(meta);

      const actions = document.createElement("div");
      actions.className = "bubble-actions";

      const replyBtn = document.createElement("button");
      replyBtn.className = "mini";
      replyBtn.type = "button";
      replyBtn.title = "Responder";
      replyBtn.textContent = "↩";
      replyBtn.addEventListener("click", () => setReply(msg));
      actions.appendChild(replyBtn);

      const markBtn = document.createElement("button");
      markBtn.className = "mini";
      markBtn.type = "button";
      markBtn.title = msg.marcada ? "Desmarcar" : "Marcar";
      markBtn.textContent = msg.marcada ? "★" : "☆";
      markBtn.addEventListener("click", () => toggleMarcada(msg));
      actions.appendChild(markBtn);

      if (minha) {
        const delBtn = document.createElement("button");
        delBtn.className = "mini danger";
        delBtn.type = "button";
        delBtn.title = "Apagar";
        delBtn.textContent = "🗑";
        delBtn.addEventListener("click", () => apagarMensagem(msg));
        actions.appendChild(delBtn);
      }

      bubble.appendChild(actions);
      row.appendChild(bubble);

      return row;
    }

    function criarConteudoMensagem(msg, minha) {
      if (msg.tipo === "gif") {
        const sticker = document.createElement("div");
        sticker.className = "sticker";
        sticker.textContent = msg.texto;
        return sticker;
      }

      if (msg.tipo === "audio") {
        const btn = document.createElement("button");
        btn.className = "audio-btn";
        btn.type = "button";
        btn.textContent = minha
          ? `▶ Seu áudio ${duracaoAudio(msg.audioDuracaoMs)}`
          : `▶ Ouvir áudio ${duracaoAudio(msg.audioDuracaoMs)}`;

        btn.addEventListener("click", () => ouvirAudio(msg));
        return btn;
      }

      if (msg.tipo === "audio_consumido") {
        const consumed = document.createElement("div");
        consumed.style.color = "#64748b";
        consumed.textContent = "🔒 Áudio ouvido";
        return consumed;
      }

      const text = document.createElement("div");
      text.textContent = msg.texto;
      return text;
    }

    function setReply(msg) {
      replyingTo = msg;
      replyPreviewText.textContent = `Respondendo ${msg.autorNome}: ${resumoMensagem(msg)}`;
      replyPreview.classList.add("visible");
      messageInput.focus();
    }

    function clearReply() {
      replyingTo = null;
      replyPreview.classList.remove("visible");
      replyPreviewText.textContent = "";
    }

    async function toggleMarcada(msg) {
      await update(ref(db, `${CHAT_PATH}/${msg.id}`), {
        marcada: !msg.marcada
      });
    }

    async function apagarMensagem(msg) {
      const ok = window.confirm("Apagar esta mensagem?");
      if (!ok) return;

      await update(ref(db, `${CHAT_PATH}/${msg.id}`), {
        apagada: true,
        texto: "",
        tipo: "texto",
        audioDataBase64: null,
        audioKeyBase64: null,
        audioIvBase64: null
      });
    }

    async function marcarMensagensComoLidas() {
      if (!perfil || !uidAtual) return;

      for (const msg of mensagens) {
        if (msg.apagada) continue;
        if (msg.autorId === perfil.id) continue;
        if (msg.vistoPor && msg.vistoPor[uidAtual]) continue;

        try {
          await set(ref(db, `${CHAT_PATH}/${msg.id}/vistoPor/${uidAtual}`), Date.now());
        } catch (_) {}
      }
    }

    async function enviarMensagem() {
      const texto = messageInput.value.trim();
      if (!texto || !perfil) return;

      messageInput.value = "";

      const agora = Date.now();
      const nova = push(ref(db, CHAT_PATH));

      const dados = {
        autorId: perfil.id,
        autorUid: uidAtual,
        autorNome: perfil.nome,
        autorEmoji: perfil.emoji,
        texto,
        tipo: "texto",
        criadoEm: agora,
        apagada: false,
        marcada: false,
        vistoPor: {
          [uidAtual]: agora
        }
      };

      if (replyingTo) {
        dados.respostaId = replyingTo.id;
        dados.respostaTexto = resumoMensagem(replyingTo);
        dados.respostaAutorNome = replyingTo.autorNome;
      }

      clearReply();

      await set(nova, dados);
    }

    async function enviarFigurinha(figurinha) {
      if (!perfil) return;

      const agora = Date.now();
      const nova = push(ref(db, CHAT_PATH));

      const dados = {
        autorId: perfil.id,
        autorUid: uidAtual,
        autorNome: perfil.nome,
        autorEmoji: perfil.emoji,
        texto: figurinha,
        tipo: "gif",
        criadoEm: agora,
        apagada: false,
        marcada: false,
        vistoPor: {
          [uidAtual]: agora
        }
      };

      if (replyingTo) {
        dados.respostaId = replyingTo.id;
        dados.respostaTexto = resumoMensagem(replyingTo);
        dados.respostaAutorNome = replyingTo.autorNome;
      }

      clearReply();

      await set(nova, dados);
      stickersDialog.close();
    }

    function base64ToUint8Array(base64) {
      const bin = atob(base64);
      const out = new Uint8Array(bin.length);

      for (let i = 0; i < bin.length; i++) {
        out[i] = bin.charCodeAt(i);
      }

      return out;
    }

    async function descriptografarAudio(msg) {
      if (!msg.audioDataBase64 || !msg.audioKeyBase64 || !msg.audioIvBase64) {
        throw new Error("Áudio indisponível.");
      }

      const cipherBytes = base64ToUint8Array(msg.audioDataBase64);
      const keyBytes = base64ToUint8Array(msg.audioKeyBase64);
      const ivBytes = base64ToUint8Array(msg.audioIvBase64);

      const key = await crypto.subtle.importKey(
        "raw",
        keyBytes,
        { name: "AES-CBC" },
        false,
        ["decrypt"]
      );

      const plainBuffer = await crypto.subtle.decrypt(
        { name: "AES-CBC", iv: ivBytes },
        key,
        cipherBytes
      );

      return new Blob([plainBuffer], { type: "audio/mp4" });
    }

    async function ouvirAudio(msg) {
      try {
        cleanupAudio();

        audioFinished = false;
        currentAudioMessage = msg;
        audioInfo.textContent = "Preparando áudio...";

        if (!audioDialog.open) audioDialog.showModal();

        const blob = await descriptografarAudio(msg);
        currentAudioUrl = URL.createObjectURL(blob);

        audioPlayer.src = currentAudioUrl;
        audioPlayer.currentTime = 0;

        audioInfo.textContent = msg.autorId === perfil.id
          ? "Seu áudio. Ouvir não apaga."
          : "Áudio recebido. Ao terminar, ele será apagado.";

        await audioPlayer.play().catch(() => {
          showToast("Clique no botão play do áudio para iniciar.");
        });
      } catch (erro) {
        showToast(`Não foi possível tocar o áudio: ${erro.message || erro}`);
        closeAudioDialog();
      }
    }

    async function consumirAudioSePreciso() {
      const msg = currentAudioMessage;
      if (!msg || !perfil) return;

      if (msg.autorId === perfil.id) return;

      await update(ref(db, `${CHAT_PATH}/${msg.id}`), {
        tipo: "audio_consumido",
        texto: "Audio ouvido",
        audioDataBase64: null,
        audioKeyBase64: null,
        audioIvBase64: null,
        audioConsumidoPorUid: uidAtual,
        audioConsumidoPerfil: perfil.id,
        audioConsumidoEm: Date.now()
      });
    }

    function cleanupAudio() {
      try {
        audioPlayer.pause();
        audioPlayer.removeAttribute("src");
        audioPlayer.load();
      } catch (_) {}

      if (currentAudioUrl) {
        URL.revokeObjectURL(currentAudioUrl);
        currentAudioUrl = null;
      }

      currentAudioMessage = null;
    }

    function closeAudioDialog() {
      cleanupAudio();

      if (audioDialog.open) {
        audioDialog.close();
      }
    }

    function renderStickers() {
      stickerGrid.innerHTML = "";

      stickers.forEach((item) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "sticker-option";
        btn.textContent = item;
        btn.addEventListener("click", () => enviarFigurinha(item));
        stickerGrid.appendChild(btn);
      });
    }

    async function iniciarChat() {
      if (!perfil) return;

      await marcarOnline();
      ouvirOutroUsuario();
      ouvirMensagens();
    }

    async function init() {
      messagesEl.innerHTML = '<div class="empty">Conectando ao Firebase...</div>';

      try {
        if (!window.isSecureContext && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
          throw new Error("A página precisa rodar em HTTPS. GitHub Pages funciona; arquivo local file:// não.");
        }

        const credential = await signInAnonymously(auth);

        uidAtual = credential?.user?.uid || auth.currentUser?.uid || "";

        if (!uidAtual) {
          await new Promise((resolve, reject) => {
            const timeout = setTimeout(() => reject(new Error("Timeout no login anônimo.")), 12000);

            const unsubscribe = onAuthStateChanged(auth, (user) => {
              if (!user) return;

              clearTimeout(timeout);
              unsubscribe();

              uidAtual = user.uid;
              resolve();
            });
          });
        }

        if (!uidAtual) {
          throw new Error("Login anônimo não retornou UID.");
        }

        await registrarDispositivoWeb();

        renderStickers();

        perfil = profileFromStorage();

        if (!perfil) {
          messagesEl.innerHTML = '<div class="empty">Escolha Sol ou Lua para entrar.</div>';
          openProfileDialog();
        } else {
          await iniciarChat();
        }
      } catch (erro) {
        mostrarErroInicial(erro);
      }
    }

    chooseSol.addEventListener("click", () => setProfileChoice("sol"));
    chooseLua.addEventListener("click", () => setProfileChoice("lua"));
    saveProfileBtn.addEventListener("click", salvarPerfilDialog);
    profileBtn.addEventListener("click", openProfileDialog);
    sendBtn.addEventListener("click", enviarMensagem);
    cancelReplyBtn.addEventListener("click", clearReply);
    stickersBtn.addEventListener("click", () => stickersDialog.showModal());
    closeStickersBtn.addEventListener("click", () => stickersDialog.close());
    stopAudioBtn.addEventListener("click", closeAudioDialog);

    audioPlayer.addEventListener("ended", async () => {
      if (audioFinished) return;

      audioFinished = true;

      try {
        await consumirAudioSePreciso();
      } catch (_) {}

      showToast("Áudio finalizado.");
      closeAudioDialog();
    });

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        enviarMensagem();
      }
    });

    window.addEventListener("beforeunload", () => {
      marcarOffline();
      cleanupAudio();
    });

    window.addEventListener("focus", () => {
      paginaComFoco = true;
      zerarIndicadorNovasMensagens();
    });

    window.addEventListener("blur", () => {
      paginaComFoco = false;
    });

    document.addEventListener("visibilitychange", () => {
      paginaComFoco = document.visibilityState === "visible";

      if (paginaComFoco) {
        zerarIndicadorNovasMensagens();
      }

      if (!perfil) return;

      if (document.visibilityState === "visible") {
        marcarOnline();
      } else {
        marcarOffline();
      }
    });

    window.addEventListener("error", (event) => {
      mostrarErroInicial(event.error || event.message || "Erro de JavaScript.");
    });

    window.addEventListener("unhandledrejection", (event) => {
      mostrarErroInicial(event.reason || "Promise rejeitada.");
    });

    document.addEventListener("pointerdown", desbloquearSomNotificacao);
    document.addEventListener("keydown", desbloquearSomNotificacao);

    init();
  </script>
</body>
